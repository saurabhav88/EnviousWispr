<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnviousWispr — Ripple Effect Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #08080c;
    --surface: #111116;
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.1);
    --text: #ededf0;
    --text-2: #8e8ea0;
    --text-3: #5a5a6e;
    --accent: #8b7cf6;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --cyan: #22d3ee;
    --pink: #f472b6;
    --orange: #fb923c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── Stage ─── */
  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .stage.visible { opacity: 1; }

  /* ─── Recording Capsule ─── */
  .capsule {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 360px;
    height: 56px;
    background: rgba(17,17,22,0.88);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 100px;
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 14px;
    z-index: 10;
    transition: border-color 0.6s ease, opacity 0.5s ease, transform 0.5s ease, box-shadow 0.5s ease;
  }

  .capsule.exit {
    opacity: 0;
    transform: translateX(-50%) scale(0.95) translateY(-20px);
    border-color: var(--green);
    box-shadow: 0 0 30px rgba(52,211,153,0.25);
  }

  /* Status dot */
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-3);
    flex-shrink: 0;
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }
  .status-dot.recording {
    background: var(--red);
    box-shadow: 0 0 8px rgba(248,113,113,0.6);
    animation: pulse-dot 1.2s ease-in-out infinite;
  }
  .status-dot.transcribing {
    background: var(--amber);
    box-shadow: 0 0 8px rgba(251,191,36,0.5);
    animation: none;
  }
  .status-dot.polishing {
    background: var(--cyan);
    box-shadow: 0 0 8px rgba(34,211,238,0.5);
    animation: none;
  }
  .status-dot.done {
    background: var(--green);
    box-shadow: 0 0 8px rgba(52,211,153,0.5);
    animation: none;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Waveform bars */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
    flex-shrink: 0;
  }
  .waveform .bar {
    width: 3px;
    height: 4px;
    border-radius: 2px;
    background: var(--text-3);
    transition: background 0.4s ease;
  }
  .waveform.active .bar {
    background: var(--red);
  }
  .waveform.transcribing .bar {
    background: var(--amber);
  }
  .waveform.polishing .bar {
    background: var(--cyan);
  }

  /* Timer */
  .timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-2);
    min-width: 42px;
    text-align: center;
    transition: color 0.4s ease;
  }

  /* Mode label */
  .mode-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-3);
    margin-left: auto;
    white-space: nowrap;
    transition: color 0.4s ease;
  }

  /* Capsule spinner */
  .capsule-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid transparent;
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
    display: none;
  }
  .capsule-spinner.visible { display: block; }
  .capsule-spinner.polishing {
    border-top-color: var(--cyan);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ─── Ripple System ─── */
  .ripple-origin {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 0;
    height: 0;
    z-index: 5;
    pointer-events: none;
  }

  .ripple {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid var(--red);
    opacity: 0;
    pointer-events: none;
  }

  @keyframes ripple-expand {
    0% {
      width: 60px;
      height: 40px;
      opacity: var(--ripple-start-opacity, 0.12);
    }
    100% {
      width: var(--ripple-size, 500px);
      height: var(--ripple-size, 500px);
      opacity: 0;
    }
  }

  @keyframes ripple-contract {
    0% {
      width: var(--ripple-size, 500px);
      height: var(--ripple-size, 500px);
      opacity: var(--ripple-start-opacity, 0.1);
    }
    100% {
      width: 20px;
      height: 20px;
      opacity: 0;
    }
  }

  /* ─── Text Zone ─── */
  .text-zone {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    min-height: 180px;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 0;
    z-index: 10;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 28px;
    background: var(--text-2);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
    transition: opacity 0.3s ease;
  }
  .cursor-blink.hidden { opacity: 0; }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .word-span {
    font-size: 24px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--text);
    display: inline-block;
    filter: blur(8px);
    opacity: 0;
    transition: filter 0.18s ease-out, opacity 0.18s ease-out;
    margin-right: 0.32em;
    position: relative;
  }
  .word-span.revealed {
    filter: blur(0);
    opacity: 1;
  }
  .word-span .word-glow {
    position: absolute;
    inset: -4px -6px;
    background: rgba(52,211,153,0.05);
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.3s ease 0.05s;
    z-index: -1;
  }
  .word-span.revealed .word-glow {
    opacity: 1;
  }
  .word-span.settled .word-glow {
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  /* ─── Stats ─── */
  .stats {
    position: absolute;
    top: calc(40% + 200px);
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.8s ease;
    z-index: 10;
    white-space: nowrap;
  }
  .stats.visible { opacity: 1; }
  .stats .sep {
    margin: 0 8px;
    color: var(--border-strong);
  }

  /* ─── Phase Stepper ─── */
  .stepper {
    position: absolute;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 0;
    z-index: 10;
  }

  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .step-circle {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid var(--text-3);
    background: transparent;
    transition: all 0.5s ease;
    position: relative;
  }
  .step-circle.idle-active {
    border-color: var(--text-2);
    background: var(--text-2);
  }
  .step-circle.recording-active {
    border-color: var(--red);
    background: var(--red);
    box-shadow: 0 0 10px rgba(248,113,113,0.4);
  }
  .step-circle.transcribing-active {
    border-color: var(--amber);
    background: var(--amber);
    box-shadow: 0 0 10px rgba(251,191,36,0.4);
  }
  .step-circle.polishing-active {
    border-color: var(--cyan);
    background: var(--cyan);
    box-shadow: 0 0 10px rgba(34,211,238,0.4);
  }
  .step-circle.pasted-active {
    border-color: var(--green);
    background: var(--green);
    box-shadow: 0 0 10px rgba(52,211,153,0.4);
  }

  .step-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: 0.04em;
    transition: color 0.4s ease;
    white-space: nowrap;
  }
  .step-label.active { color: var(--text-2); }

  .step-line {
    width: 48px;
    height: 1px;
    background: var(--border-strong);
    margin: 0 4px;
    margin-bottom: 24px;
    transition: background 0.5s ease;
  }
  .step-line.active {
    background: var(--text-3);
  }

  /* ─── Keyboard Hint ─── */
  .keyboard-hint {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%) scale(0.8);
    background: rgba(139,124,246,0.12);
    border: 1px solid rgba(139,124,246,0.3);
    border-radius: 100px;
    padding: 10px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.03em;
    opacity: 0;
    z-index: 20;
    transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .keyboard-hint.pop {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }
  .keyboard-hint.fade-out {
    opacity: 0;
    transform: translateX(-50%) scale(1);
    transition: opacity 0.35s ease;
  }

  /* ─── Replay Button ─── */
  .replay-btn {
    position: fixed;
    bottom: 24px;
    right: 32px;
    background: rgba(17,17,22,0.8);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-strong);
    border-radius: 100px;
    padding: 10px 20px;
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    z-index: 100;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .replay-btn.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .replay-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(139,124,246,0.08);
  }
  .replay-btn svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ─── Title watermark ─── */
  .watermark {
    position: fixed;
    top: 28px;
    left: 36px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.8s ease;
    z-index: 100;
  }
  .watermark.visible { opacity: 0.5; }
</style>
</head>
<body>

<div class="watermark" id="watermark">ENVIOUSWISPR</div>

<div class="stage" id="stage">
  <!-- Ripple Origin -->
  <div class="ripple-origin" id="rippleOrigin"></div>

  <!-- Recording Capsule -->
  <div class="capsule" id="capsule">
    <div class="status-dot" id="statusDot"></div>
    <div class="waveform" id="waveform">
      <div class="bar" id="bar0"></div>
      <div class="bar" id="bar1"></div>
      <div class="bar" id="bar2"></div>
      <div class="bar" id="bar3"></div>
      <div class="bar" id="bar4"></div>
    </div>
    <div class="timer" id="timer"></div>
    <div class="capsule-spinner" id="capsuleSpinner"></div>
    <div class="mode-label" id="modeLabel">Ready</div>
  </div>

  <!-- Text Zone -->
  <div class="text-zone" id="textZone">
    <div class="cursor-blink" id="cursor"></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">
    5s spoken<span class="sep">&mdash;</span>8.5s total<span class="sep">&mdash;</span>0 lines of code
  </div>

  <!-- Phase Stepper -->
  <div class="stepper" id="stepper">
    <div class="step">
      <div class="step-circle idle-active" id="stepIdle"></div>
      <div class="step-label active" id="labelIdle">Idle</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step">
      <div class="step-circle" id="stepRecording"></div>
      <div class="step-label" id="labelRecording">Recording</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step">
      <div class="step-circle" id="stepTranscribing"></div>
      <div class="step-label" id="labelTranscribing">Transcribing</div>
    </div>
    <div class="step-line" id="line3"></div>
    <div class="step">
      <div class="step-circle" id="stepPolishing"></div>
      <div class="step-label" id="labelPolishing">Polishing</div>
    </div>
    <div class="step-line" id="line4"></div>
    <div class="step">
      <div class="step-circle" id="stepPasted"></div>
      <div class="step-label" id="labelPasted">Pasted</div>
    </div>
  </div>

  <!-- Keyboard Hint -->
  <div class="keyboard-hint" id="keyHint">&#x2325; Option + Space</div>
</div>

<!-- Replay Button -->
<button class="replay-btn" id="replayBtn">
  <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
  Replay
</button>

<script>
(function() {
  'use strict';

  // ─── Elements ───
  var stage = document.getElementById('stage');
  var watermark = document.getElementById('watermark');
  var capsule = document.getElementById('capsule');
  var statusDot = document.getElementById('statusDot');
  var waveformEl = document.getElementById('waveform');
  var barEls = [
    document.getElementById('bar0'),
    document.getElementById('bar1'),
    document.getElementById('bar2'),
    document.getElementById('bar3'),
    document.getElementById('bar4')
  ];
  var timerEl = document.getElementById('timer');
  var capsuleSpinner = document.getElementById('capsuleSpinner');
  var modeLabelEl = document.getElementById('modeLabel');
  var textZone = document.getElementById('textZone');
  var statsEl = document.getElementById('stats');
  var keyHint = document.getElementById('keyHint');
  var replayBtn = document.getElementById('replayBtn');
  var rippleOrigin = document.getElementById('rippleOrigin');

  // Stepper
  var stepIdle = document.getElementById('stepIdle');
  var stepRecording = document.getElementById('stepRecording');
  var stepTranscribing = document.getElementById('stepTranscribing');
  var stepPolishing = document.getElementById('stepPolishing');
  var stepPasted = document.getElementById('stepPasted');
  var labelIdle = document.getElementById('labelIdle');
  var labelRecording = document.getElementById('labelRecording');
  var labelTranscribing = document.getElementById('labelTranscribing');
  var labelPolishing = document.getElementById('labelPolishing');
  var labelPasted = document.getElementById('labelPasted');
  var line1 = document.getElementById('line1');
  var line2 = document.getElementById('line2');
  var line3 = document.getElementById('line3');
  var line4 = document.getElementById('line4');

  var DEMO_TEXT = 'I wanted to circle back on our Q3 planning discussion from last Tuesday. I think the timeline we proposed is realistic, but we should probably add a buffer week for the integration testing phase.';
  var WORDS = DEMO_TEXT.split(' ');

  var animFrame = null;
  var pendingTimeouts = [];
  var waveformRunning = false;

  function schedule(fn, ms) {
    var t = setTimeout(fn, ms);
    pendingTimeouts.push(t);
    return t;
  }

  // ─── CSS var reader ───
  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  // ─── Ripple Factory ───
  function spawnRipple(color, size, duration, reverse) {
    var el = document.createElement('div');
    el.className = 'ripple';
    el.style.borderColor = color;
    el.style.setProperty('--ripple-size', size + 'px');
    el.style.setProperty('--ripple-start-opacity', reverse ? '0.08' : '0.1');
    el.style.animation = (reverse ? 'ripple-contract' : 'ripple-expand') + ' ' + duration + 's ease-out forwards';
    rippleOrigin.appendChild(el);
    schedule(function() {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, duration * 1000 + 200);
  }

  // ─── Waveform Animation ───
  function startWaveform() {
    waveformRunning = true;
    var startT = performance.now();
    var freqs = [2.8, 3.5, 4.2, 3.0, 3.7];
    var phases = [0, 1.2, 2.4, 0.8, 2.0];
    var maxH = [22, 18, 26, 16, 20];

    function tick() {
      if (!waveformRunning) return;
      var t = (performance.now() - startT) / 1000;
      for (var i = 0; i < barEls.length; i++) {
        var h = 4 + (maxH[i] - 4) * (0.5 + 0.5 * Math.sin(freqs[i] * t + phases[i]));
        barEls[i].style.height = h + 'px';
      }
      animFrame = requestAnimationFrame(tick);
    }
    tick();
  }

  function slowWaveform() {
    for (var i = 0; i < barEls.length; i++) {
      barEls[i].style.transition = 'height 0.8s ease';
      barEls[i].style.height = (6 + i % 2 * 2) + 'px';
    }
  }

  function stopWaveform() {
    waveformRunning = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    for (var i = 0; i < barEls.length; i++) {
      barEls[i].style.transition = 'height 0.4s ease';
      barEls[i].style.height = '4px';
    }
  }

  // ─── Stepper Helpers ───
  function resetStepper() {
    var circles = [stepIdle, stepRecording, stepTranscribing, stepPolishing, stepPasted];
    var labels = [labelIdle, labelRecording, labelTranscribing, labelPolishing, labelPasted];
    var lines = [line1, line2, line3, line4];
    for (var i = 0; i < circles.length; i++) circles[i].className = 'step-circle';
    for (var j = 0; j < labels.length; j++) labels[j].className = 'step-label';
    for (var k = 0; k < lines.length; k++) lines[k].className = 'step-line';
    stepIdle.classList.add('idle-active');
    labelIdle.classList.add('active');
  }

  function activateStep(circle, label, linesBefore, circleClass) {
    circle.className = 'step-circle ' + circleClass;
    label.className = 'step-label active';
    for (var i = 0; i < linesBefore.length; i++) {
      linesBefore[i].classList.add('active');
    }
  }

  // ─── Build Word Spans Safely (no innerHTML) ───
  function buildWordSpans() {
    // Clear text zone
    while (textZone.firstChild) textZone.removeChild(textZone.firstChild);

    var spans = [];
    for (var i = 0; i < WORDS.length; i++) {
      var span = document.createElement('span');
      span.className = 'word-span';
      span.textContent = WORDS[i];
      var glow = document.createElement('div');
      glow.className = 'word-glow';
      span.appendChild(glow);
      textZone.appendChild(span);
      spans.push(span);
    }
    return spans;
  }

  // ─── Reset Everything ───
  function resetAll() {
    for (var i = 0; i < pendingTimeouts.length; i++) clearTimeout(pendingTimeouts[i]);
    pendingTimeouts = [];
    stopWaveform();

    // Capsule
    capsule.classList.remove('exit');
    capsule.style.borderColor = '';
    capsule.style.boxShadow = '';
    statusDot.className = 'status-dot';
    waveformEl.className = 'waveform';
    for (var b = 0; b < barEls.length; b++) {
      barEls[b].style.transition = '';
      barEls[b].style.height = '4px';
      barEls[b].style.background = '';
    }
    timerEl.textContent = '';
    modeLabelEl.textContent = 'Ready';
    modeLabelEl.style.color = '';
    capsuleSpinner.className = 'capsule-spinner';

    // Text zone
    while (textZone.firstChild) textZone.removeChild(textZone.firstChild);
    var newCursor = document.createElement('div');
    newCursor.className = 'cursor-blink';
    newCursor.id = 'cursor';
    textZone.appendChild(newCursor);

    // Stats
    statsEl.classList.remove('visible');

    // Key hint
    keyHint.className = 'keyboard-hint';

    // Stepper
    resetStepper();

    // Replay
    replayBtn.classList.remove('visible');

    // Ripples
    while (rippleOrigin.firstChild) rippleOrigin.removeChild(rippleOrigin.firstChild);

    // Watermark
    watermark.classList.remove('visible');
  }

  // ─── Main Sequence ───
  function runSequence() {
    resetAll();

    // ─── Phase 1: Fade In / Idle (0-2s) ───
    schedule(function() {
      stage.classList.add('visible');
      watermark.classList.add('visible');
    }, 0);

    // ─── Phase 2: Activation (2-3s) ───
    schedule(function() {
      keyHint.classList.add('pop');
    }, 2000);

    schedule(function() {
      keyHint.classList.remove('pop');
      keyHint.classList.add('fade-out');
    }, 2600);

    schedule(function() {
      // Capsule goes red
      capsule.style.borderColor = 'rgba(248,113,113,0.5)';
      statusDot.classList.add('recording');
      modeLabelEl.textContent = 'Recording';
      modeLabelEl.style.color = cssVar('--red');
      waveformEl.classList.add('active');
      timerEl.textContent = '00:00';

      // Activation ripple
      spawnRipple('rgba(248,113,113,0.3)', 400, 1.8, false);

      // Stepper
      activateStep(stepRecording, labelRecording, [line1], 'recording-active');
    }, 2800);

    // ─── Phase 3: Recording (3-8s) ───
    schedule(function() {
      startWaveform();
    }, 3000);

    // Timer counting
    for (var s = 1; s <= 5; s++) {
      (function(sec) {
        schedule(function() {
          timerEl.textContent = '00:0' + sec;
        }, 3000 + sec * 1000);
      })(s);
    }

    // Recording ripples
    schedule(function() { spawnRipple('rgba(248,113,113,0.2)', 500, 2.5, false); }, 3500);
    schedule(function() { spawnRipple('rgba(248,113,113,0.15)', 600, 2.8, false); }, 5300);
    schedule(function() { spawnRipple('rgba(248,113,113,0.12)', 550, 2.6, false); }, 7100);

    // ─── Phase 4: Processing (8-12s) ───
    // 8-10s: Transcribing
    schedule(function() {
      slowWaveform();
      capsule.style.borderColor = 'rgba(251,191,36,0.5)';
      statusDot.className = 'status-dot transcribing';
      waveformEl.className = 'waveform transcribing';
      modeLabelEl.textContent = 'Transcribing\u2026';
      modeLabelEl.style.color = cssVar('--amber');
      timerEl.textContent = '00:05';
      capsuleSpinner.className = 'capsule-spinner visible';

      spawnRipple('rgba(251,191,36,0.2)', 450, 2.0, false);
      activateStep(stepTranscribing, labelTranscribing, [line1, line2], 'transcribing-active');
    }, 8000);

    // 10-12s: Polishing
    schedule(function() {
      capsule.style.borderColor = 'rgba(34,211,238,0.5)';
      statusDot.className = 'status-dot polishing';
      waveformEl.className = 'waveform polishing';
      modeLabelEl.textContent = 'Polishing\u2026';
      modeLabelEl.style.color = cssVar('--cyan');
      capsuleSpinner.className = 'capsule-spinner visible polishing';

      spawnRipple('rgba(34,211,238,0.2)', 480, 2.0, false);
      activateStep(stepPolishing, labelPolishing, [line1, line2, line3], 'polishing-active');
    }, 10000);

    // ─── Phase 5: The Reveal (12-17s) ───
    schedule(function() {
      stopWaveform();
      capsuleSpinner.className = 'capsule-spinner';

      // Capsule exit
      capsule.classList.add('exit');

      // Hide cursor
      var cursorEl = document.getElementById('cursor');
      if (cursorEl) cursorEl.classList.add('hidden');

      // Reverse ripples — energy collapsing into text zone
      spawnRipple('rgba(52,211,153,0.15)', 600, 1.2, true);
      schedule(function() { spawnRipple('rgba(52,211,153,0.1)', 500, 1.0, true); }, 200);
      schedule(function() { spawnRipple('rgba(52,211,153,0.08)', 450, 0.9, true); }, 400);

      // Build word spans and stagger reveal
      var spans = buildWordSpans();

      for (var i = 0; i < spans.length; i++) {
        (function(span, idx) {
          schedule(function() {
            span.classList.add('revealed');
          }, 600 + idx * 80);

          schedule(function() {
            span.classList.add('settled');
          }, 600 + idx * 80 + 1500);
        })(spans[i], i);
      }
    }, 12000);

    // ─── Phase 6: Settle (17-19s) ───
    schedule(function() {
      statsEl.classList.add('visible');
      activateStep(stepPasted, labelPasted, [line1, line2, line3, line4], 'pasted-active');
      spawnRipple('rgba(52,211,153,0.08)', 800, 3.0, false);
    }, 17000);

    schedule(function() {
      replayBtn.classList.add('visible');
    }, 18200);
  }

  // ─── Replay ───
  replayBtn.addEventListener('click', function() {
    stage.classList.remove('visible');
    setTimeout(function() {
      runSequence();
    }, 400);
  });

  // ─── Auto-start ───
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(runSequence, 300);
  });

})();
</script>
</body>
</html>
