name: CI Drift Check

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at noon UTC
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check action refs are SHA-pinned
        run: |
          echo "==> Checking for floating action refs ..."
          FAIL=0
          for WF in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$WF" ] || continue
            # Find all 'uses:' lines with external actions, filter out SHA-pinned ones
            FLOATING=$(grep -nE 'uses:\s+[a-zA-Z]' "$WF" | grep -vE '@[0-9a-f]{40}' || true)
            if [ -n "$FLOATING" ]; then
              echo "$FLOATING"
              echo "::error file=$WF::Floating action ref found — pin to full SHA"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 0 ]; then
            echo "All action refs are SHA-pinned."
          else
            exit 1
          fi

      - name: Check referenced scripts exist
        run: |
          echo "==> Checking script references ..."
          FAIL=0
          for WF in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$WF" ] || continue
            while IFS= read -r SCRIPT; do
              [ -n "$SCRIPT" ] || continue
              if [ -f "$SCRIPT" ]; then
                echo "  OK  $SCRIPT"
              elif [ -f "website/$SCRIPT" ]; then
                # deploy-blog runs this path with working-directory: website.
                echo "  OK  website/$SCRIPT"
              else
                echo "::error file=$WF::Referenced script $SCRIPT does not exist"
                FAIL=1
              fi
            done < <(grep -oE '(\./)?scripts/[a-zA-Z0-9_./-]+\.sh' "$WF" | sort -u)
          done
          if [ "$FAIL" -eq 0 ]; then
            echo "All referenced scripts exist."
          else
            exit 1
          fi

      - name: Validate workflow YAML syntax
        run: |
          echo "==> Validating workflow YAML ..."
          pip install --quiet yamllint
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable, document-start: disable, comments: disable, brackets: disable, comments-indentation: disable}}" \
            .github/workflows/*.yml
          echo "All workflows pass YAML validation."

      - name: Check release-notes renderer parses What's New
        run: |
          echo "==> Verifying the release-notes renderer can read WhatsNewContent.swift ..."
          # Catches drift between the Swift What's New format and the parser the
          # release workflow relies on, before it silently falls back to auto-notes.
          python3 scripts/ci/render-release-notes.py --self-test

      - name: Check appcast delivery owner
        run: |
          set -euo pipefail
          echo "==> ShellCheck appcast delivery owner ..."
          shellcheck scripts/ci/appcast-delivery.sh
          echo "==> Running deterministic appcast delivery self-test ..."
          scripts/ci/appcast-delivery.sh --self-test

      - name: Drift check summary
        if: always()
        run: |
          echo "## CI Drift Check Complete"
          echo "- Action SHA pinning: checked"
          echo "- Script existence: checked"
          echo "- YAML validity: checked"
          echo "- Release-notes renderer: checked"
          echo "- Appcast delivery ShellCheck + self-test: checked"
