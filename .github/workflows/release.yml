name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Recovery / dry-run mode (build-only = build+sign+notarize, no publish)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - release-only
          - appcast-only
          - sentry-only
          - build-only
      tag:
        description: 'Tag (e.g. v1.7.1) — required for all modes'
        required: false
        type: string
      source_run_id:
        description: 'Run ID that produced build artifacts — required for recovery modes'
        required: false
        type: string
      dry_run:
        description: 'Rehearsal: run the whole pipeline (incl. publish/limb jobs on their runners) but gate every real side-effect step. No release, no push, no Sentry finalize. Use with mode=full.'
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

# ==========================================================================
# Architecture: Heart & Limbs
#
# HEART (must succeed for release to ship):
#   Job A: build-release-artifacts — build, sign, notarize, package
#   Job B: publish-github-release  — create GitHub Release with DMGs
#
# LIMBS (report failure, never block shipping):
#   Job C: publish-appcast         — push appcast entry to main
#   Job D: upload-sentry-dsyms     — upload debug symbols to Sentry
#   Job E: release-summary         — single truth source for release status
#
# Auth strategy:
#   - GITHUB_TOKEN for read-only ops and GitHub Release creation
#   - GitHub App token (enviouswispr-release-bot) for protected-branch writes
#   - persist-credentials: false on any checkout before explicit push/PR
# ==========================================================================

jobs:
  # ==========================================================================
  # Preflight — fail fast before expensive work
  # ==========================================================================
  preflight:
    runs-on: ubuntu-latest   # #1117: bash-only (version regex, secret-presence, summary) — no macOS dependency
    timeout-minutes: 5
    permissions:
      contents: read   # checkout
      issues: read     # #1144: warn-only release-action surfacing below
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      source-run-id: ${{ steps.resolve-run.outputs.run-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 1

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
            if [[ -z "$TAG" ]]; then
              echo "::error::inputs.tag is required for workflow_dispatch"
              exit 1
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "==> Tag: $TAG | Version: $VERSION"

      - name: Validate tag format
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag must be semver (v1.2.3), got: v${VERSION}"
            exit 1
          fi

      # #1144: Warn-only backstop. Surfaces issues labeled `release-action`
      # (deferred release-time actions, e.g. the #1144 Sentry-regroup rollout)
      # on EVERY release path — including manual `git push` of a tag,
      # `workflow_dispatch`, and releases from a fresh clone or another machine,
      # all of which skip the local `.claude/` release-checklist skill's Step 0.
      # NEVER blocks a release: no `set -e`, and the query is fully swallowed on
      # error, so a GitHub API hiccup can never stop shipping. #1144 itself is
      # meant to stay OPEN through the release, which is why this warns, not fails.
      - name: Surface open release-action issues (warn-only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Two-step so an API error body (a JSON object, not an array) can never
          # leak into a false warning: jq emits only when the response is a real
          # array of issues.
          raw="$(gh api -X GET "repos/${GITHUB_REPOSITORY}/issues" \
            -f state=open -f labels=release-action -f per_page=100 2>/dev/null || true)"
          issues="$(printf '%s' "$raw" | jq -r '
            if type == "array"
            then .[] | select(.pull_request | not) | "- #\(.number): \(.title) (\(.html_url))"
            else empty end' 2>/dev/null || true)"
          if [[ -n "$issues" ]]; then
            echo "::warning title=Open release-action issues::Handle each issue's release-day steps before/around this release."
            {
              echo "### ⚠️ Open release-action issues"
              echo ""
              echo "$issues"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No open release-action issues."
          fi

      - name: Validate dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          MODE: ${{ inputs.mode }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          case "$MODE" in
            full|build-only) ;;
            release-only|appcast-only|sentry-only)
              if [[ -z "$SOURCE_RUN_ID" ]]; then
                echo "::error::source_run_id is required for ${MODE} recovery mode"
                exit 1
              fi
              ;;
            *) echo "::error::Invalid mode: $MODE"; exit 1 ;;
          esac
          # #1117: dry_run rehearses the full build+publish path, so it only makes
          # sense with a build mode. A recovery mode reuses prior artifacts and has
          # nothing to rehearse — reject the nonsensical combo cleanly.
          if [[ "$DRY_RUN" == "true" && "$MODE" != "full" && "$MODE" != "build-only" ]]; then
            echo "::error::dry_run=true requires mode=full (or build-only); got mode=${MODE}"
            exit 1
          fi

      - name: Resolve source run ID
        id: resolve-run
        env:
          MODE: ${{ inputs.mode || 'full' }}
          INPUT_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          if [[ "$MODE" == "full" || "$MODE" == "build-only" ]] || [[ -z "$INPUT_RUN_ID" ]]; then
            echo "run-id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
            echo "==> Source run: current (${{ github.run_id }})"
          else
            echo "run-id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "==> Source run: $INPUT_RUN_ID (from input)"
          fi

      - name: Check required secrets
        env:
          HAS_SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
          HAS_DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT_BASE64 != '' }}
          HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_BASE64 != '' }}
          HAS_APP_ID: ${{ secrets.APP_ID != '' }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY != '' }}
          MODE: ${{ inputs.mode || 'full' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          FAIL=0

          # Build secrets — required for full, release-only, and build-only.
          # (dry_run still builds+signs, so these stay required.)
          if [[ "$MODE" == "full" || "$MODE" == "release-only" || "$MODE" == "build-only" ]]; then
            [[ "$HAS_SPARKLE_PRIVATE_KEY" == "true" ]] || { echo "::error::SPARKLE_PRIVATE_KEY missing"; FAIL=1; }
            [[ "$HAS_DEVELOPER_ID_CERT" == "true" ]]    || { echo "::error::DEVELOPER_ID_CERT_BASE64 missing"; FAIL=1; }
            [[ "$HAS_APPLE_API_KEY" == "true" ]]         || { echo "::error::APPLE_API_KEY_BASE64 missing"; FAIL=1; }
          fi

          # App token — required for appcast push. #1117 least-privilege: a dry_run
          # rehearsal MUST NOT push to main, so it does not require (and the appcast
          # job will not mint) the App credentials. Requiring them only for a real
          # publish keeps the rehearsal credential-starved → a forgotten gate fails
          # auth instead of mutating.
          if [[ ( "$MODE" == "full" || "$MODE" == "appcast-only" ) && "$DRY_RUN" != "true" ]]; then
            [[ "$HAS_APP_ID" == "true" ]]          || { echo "::error::APP_ID missing"; FAIL=1; }
            [[ "$HAS_APP_PRIVATE_KEY" == "true" ]]  || { echo "::error::APP_PRIVATE_KEY missing"; FAIL=1; }
          fi

          [[ $FAIL -eq 0 ]] || exit 1
          echo "==> All required secrets present"

      - name: Write job summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          MODE: ${{ inputs.mode || 'full' }}
          SOURCE_RUN: ${{ steps.resolve-run.outputs.run-id }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## Release Preflight — v${VERSION}

          | Check | Result |
          |---|---|
          | Tag | \`${TAG}\` |
          | Mode | \`${MODE}\` |
          | Run ID | \`${{ github.run_id }}\` |
          | Source run ID | \`${SOURCE_RUN}\` |
          SUMMARY

  # ==========================================================================
  # HEART Job A — Build Release Artifacts
  # Pure build: no side effects, no releases, no pushes.
  # ==========================================================================
  build-release-artifacts:
    needs: [preflight]
    if: >
      github.event_name == 'push' ||
      inputs.mode == 'full' ||
      inputs.mode == 'build-only'
    runs-on: macos-26
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Verify SDK supports FoundationModels
        run: |
          set -euo pipefail

          echo "==> Environment diagnostics"
          swift --version
          SDK_VER="$(xcrun --sdk macosx --show-sdk-version)"
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "macOS SDK: $SDK_VER"
          echo "SDK path: $SDK_PATH"

          XCODE_VER="$(xcodebuild -version 2>/dev/null | head -n1 || true)"
          if [ -n "$XCODE_VER" ]; then
            echo "Xcode: $XCODE_VER"
          else
            echo "Xcode: not installed (Command Line Tools only)"
          fi

          if [ "$(printf '%s\n' "26.0" "$SDK_VER" | sort -V | head -n1)" != "26.0" ]; then
            echo "::error::macOS SDK 26.0+ required for FoundationModels (found: $SDK_VER)"
            exit 1
          fi

          cat > foundation_models_probe.swift <<'PROBE'
          import Foundation
          import FoundationModels

          func _probe() {
            _ = SystemLanguageModel.default
          }
          PROBE

          xcrun swiftc \
            -sdk "$SDK_PATH" \
            -target arm64-apple-macos26.0 \
            foundation_models_probe.swift \
            -o /tmp/foundation_models_probe

          echo "==> FoundationModels compile probe PASSED"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install mise + Tuist
        env:
          # Pin mise to a checksummed GitHub release binary instead of the
          # unpinned `curl https://mise.run | sh` installer. This step runs in
          # the signing job immediately before the Developer ID cert import, so a
          # compromised installer endpoint could otherwise persist a shim that
          # exfiltrates the signing identity. (#1128)
          # Bump: set VERSION + SHA256 together — sha256 of
          # mise-<VERSION>-macos-arm64, cross-checked vs the release SHASUMS256.txt.
          MISE_VERSION: v2026.6.11
          MISE_SHA256: 5cde7e282e64fd1cea3b1e28b1dc918ee118c3a651be4d8ce27b8494950a26c7
        run: |
          set -euo pipefail
          [ "$(uname -m)" = arm64 ] || { echo "::error::Expected arm64 runner, got $(uname -m)"; exit 1; }
          MISE_URL="https://github.com/jdx/mise/releases/download/${MISE_VERSION}/mise-${MISE_VERSION}-macos-arm64"
          MISE_TMP="$RUNNER_TEMP/mise"
          echo "==> Downloading pinned mise ${MISE_VERSION} from ${MISE_URL}"
          curl --proto '=https' --tlsv1.2 --fail --location \
            --retry 3 --retry-connrefused --connect-timeout 15 --max-time 120 \
            -sS -o "$MISE_TMP" "$MISE_URL"
          echo "${MISE_SHA256}  ${MISE_TMP}" | shasum -a 256 -c -
          mkdir -p "$HOME/.local/bin"
          chmod +x "$MISE_TMP"
          mv "$MISE_TMP" "$HOME/.local/bin/mise"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mise" --version | grep -qF "${MISE_VERSION#v}" \
            || { echo "::error::mise version mismatch (expected ${MISE_VERSION#v})"; exit 1; }
          "$HOME/.local/bin/mise" install tuist@4.195.11
          "$HOME/.local/bin/mise" x tuist@4.195.11 -- tuist version

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 32)"
          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          # Make the ephemeral keychain the default so codesign resolves the
          # identity (signed by name in build-release-dmg.sh) unambiguously on a
          # fresh hosted image. (#1087)
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Build, sign & package release DMG
        env:
          CODESIGN_IDENTITY: "Developer ID Application: ${{ secrets.APPLE_TEAM_NAME }} (${{ secrets.APPLE_TEAM_ID }})"
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SU_FEED_URL: "https://enviouswispr.com/appcast.xml"
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          # Xcode-engine build + sign (embeds the Developer ID provisioning profile
          # that authorizes the keychain entitlement at launch) + DMG. Secrets and
          # feed are stamped into Info.plist at archive time via an xcconfig the
          # script generates from these env vars. (#913 PR6)
          ./scripts/build-release-dmg.sh "$VERSION"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          DMG_PATH="build/EnviousWispr-${VERSION}.dmg"

          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo -n "${APPLE_API_KEY_BASE64}" | base64 --decode -o "${KEY_PATH}"

          echo "==> Submitting ${DMG_PATH} for notarization (--wait, 5h timeout) ..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit "${DMG_PATH}" \
            --key "${KEY_PATH}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --wait --timeout 18000 2>&1) || true

          echo "${SUBMIT_OUTPUT}"
          SUBMISSION_ID=$(echo "${SUBMIT_OUTPUT}" | grep "id:" | head -1 | awk '{print $2}')

          if echo "${SUBMIT_OUTPUT}" | grep -q "status: Accepted"; then
            echo "==> Notarization accepted. Stapling ..."
            xcrun stapler staple "${DMG_PATH}"
            # Re-verify the stapled ticket actually stuck before we ship. (#1087)
            xcrun stapler validate "${DMG_PATH}"
            echo "==> Stapled + validated. Done."
            rm -f "${KEY_PATH}"
          elif echo "${SUBMIT_OUTPUT}" | grep -q "status: Invalid"; then
            echo "::error::Notarization REJECTED — fetching log for details"
            xcrun notarytool log "${SUBMISSION_ID}" \
              --key "${KEY_PATH}" \
              --key-id "${APPLE_API_KEY_ID}" \
              --issuer "${APPLE_API_ISSUER_ID}" 2>&1 || true
            rm -f "${KEY_PATH}"
            exit 1
          else
            echo "::error::Notarization did not complete — last output above"
            rm -f "${KEY_PATH}"
            exit 1
          fi

      - name: Verify Gatekeeper acceptance (final stapled artifact)
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          # #957: the build script's only spctl assessment runs PRE-notarization and
          # is allowed to fail. This is the real "will Gatekeeper let a user open
          # this" gate on the notarized + stapled DMG users actually download.
          DMG_PATH="build/EnviousWispr-${VERSION}.dmg"
          # #957 follow-up (Codex P2 on #1153): assess the DMG CONTAINER itself —
          # it is the artifact users download and double-click first. Apple's
          # Gatekeeper guidance checks disk images with `-t open`
          # (`--context context:primary-signature`); the `-t exec` assessment below
          # only covers the nested app. `stapler validate` confirms the ticket
          # stuck, but does not run the full Gatekeeper policy on the container.
          echo "==> spctl Gatekeeper assessment of the shipped DMG container ..."
          spctl -a -t open --context context:primary-signature -v "$DMG_PATH"
          echo "==> Gatekeeper accepts the notarized + stapled DMG."
          # Also assess the nested app (what the user launches after copying it out).
          MOUNT="${RUNNER_TEMP}/gatekeeper-mount"
          rm -rf "$MOUNT"; mkdir -p "$MOUNT"
          # Trap so a rejection still unmounts (set -e exits before explicit detach).
          trap 'hdiutil detach "$MOUNT" 2>/dev/null || true; rm -rf "$MOUNT"' EXIT
          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT" -nobrowse -readonly
          echo "==> spctl Gatekeeper assessment of the shipped app ..."
          spctl --assess --type exec --verbose=2 "$MOUNT/EnviousWispr.app"
          echo "==> Gatekeeper accepts the notarized + stapled app."
          hdiutil detach "$MOUNT"; rm -rf "$MOUNT"
          trap - EXIT

      - name: Generate Sparkle appcast entry
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ needs.preflight.outputs.version }}
          # Issue #953: when set, forces hosts BELOW this version onto Sparkle's
          # attended (prompted) update path instead of a silent background install
          # (Sparkle marks the item a majorUpgrade -> SPUAutomaticUpdateDriver defers).
          # Set deliberately per high-risk release (bundle/signing/installer/size change);
          # leave empty for ordinary patches. Empty -> element omitted entirely.
          SPARKLE_MIN_AUTOUPDATE_VERSION: "2.1.0"
        run: |
          DMG_PATH="build/EnviousWispr-${VERSION}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          DATE=$(date -R)

          if [[ -z "${SPARKLE_PRIVATE_KEY}" ]]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set — cannot sign update"
            exit 1
          fi
          SIGN_UPDATE="$(find build/DerivedData -path '*/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update' -type f -print -quit)"
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "::error::Sparkle sign_update not found under build/DerivedData"
            exit 1
          fi
          EDDSA_SIG=$(echo "${SPARKLE_PRIVATE_KEY}" | "$SIGN_UPDATE" -p "${DMG_PATH}" --ed-key-file /dev/stdin 2>/dev/null || echo "")
          if [[ -z "${EDDSA_SIG}" ]]; then
            echo "::error::Sparkle EdDSA signature is empty — sign_update failed"
            exit 1
          fi

          # Issue #953: optional major-upgrade floor. Build the element only when set;
          # an empty element behaves like "absent" to Sparkle but we omit it cleanly.
          MIN_AUTOUPDATE_ELEMENT=""
          if [[ -n "${SPARKLE_MIN_AUTOUPDATE_VERSION}" ]]; then
            MIN_AUTOUPDATE_ELEMENT=$'\n                '"<sparkle:minimumAutoupdateVersion>${SPARKLE_MIN_AUTOUPDATE_VERSION}</sparkle:minimumAutoupdateVersion>"
          fi

          mkdir -p build
          cat > build/appcast-entry.xml << ENTRY
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>${MIN_AUTOUPDATE_ELEMENT}
                <enclosure
                  url="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/EnviousWispr-${VERSION}.dmg"
                  length="${DMG_SIZE}"
                  type="application/octet-stream"
                  sparkle:edSignature="${EDDSA_SIG}"
                />
              </item>
          ENTRY

      - name: Copy DMG alias
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: cp "build/EnviousWispr-${VERSION}.dmg" "build/EnviousWispr.dmg"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts-${{ needs.preflight.outputs.version }}
          retention-days: 30
          path: |
            build/EnviousWispr-*.dmg
            build/EnviousWispr.dmg
            build/appcast-entry.xml

      - name: Upload dSYM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dsym-artifacts-${{ needs.preflight.outputs.version }}
          retention-days: 30
          path: build/dSYMs/

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true

      - name: Write job summary
        if: always()
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## Build Artifacts — v${VERSION}

          | Detail | Value |
          |---|---|
          | Run ID | \`${{ github.run_id }}\` |
          | Artifact name | \`release-artifacts-${VERSION}\` |
          | dSYM artifact | \`dsym-artifacts-${VERSION}\` |
          SUMMARY

  # ==========================================================================
  # HEART Job B — Publish GitHub Release
  # Idempotent: probes first, only clobbers in explicit recovery mode.
  # ==========================================================================
  publish-github-release:
    needs: [preflight, build-release-artifacts]
    if: |
      always() && (
        github.event_name == 'push' ||
        inputs.mode == 'full' ||
        inputs.mode == 'release-only'
      ) && (
        needs.preflight.result == 'success'
      ) && (
        needs.build-release-artifacts.result == 'success' ||
        needs.build-release-artifacts.result == 'skipped'
      )
    runs-on: macos-26
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read   # cross-run download-artifact (recovery modes) (#1087)
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts-${{ needs.preflight.outputs.version }}
          path: build/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.preflight.outputs.source-run-id }}

      - name: Check if GitHub Release exists
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "==> Release $TAG already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "==> Release $TAG does not exist — will create"
          fi

      - name: Create GitHub Release
        if: steps.check-release.outputs.exists == 'false' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          # --repo is required on hosted runners: this job has no checkout, so a
          # fresh hosted workspace has no .git for gh to infer the repo from. (#1087)
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "EnviousWispr v${VERSION}" \
            --generate-notes \
            "build/EnviousWispr-${VERSION}.dmg" \
            "build/EnviousWispr.dmg"

      - name: DRY RUN — GitHub Release (no-op)
        if: steps.check-release.outputs.exists == 'false' && inputs.dry_run == true
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          # #1117: rehearsal — print the exact command that WOULD run, create nothing.
          echo "DRY RUN: would run:"
          echo "  gh release create \"$TAG\" --repo \"${{ github.repository }}\" --title \"EnviousWispr v${VERSION}\" --generate-notes build/EnviousWispr-${VERSION}.dmg build/EnviousWispr.dmg"
          ls -la build/EnviousWispr-*.dmg build/EnviousWispr.dmg 2>/dev/null || echo "::warning::expected DMGs not found in dry-run download"

      - name: Upload assets to existing release (recovery only)
        if: steps.check-release.outputs.exists == 'true' && inputs.mode == 'release-only' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          echo "==> Recovery mode: overwriting assets on existing release $TAG"
          gh release upload "$TAG" --repo "${{ github.repository }}" --clobber \
            "build/EnviousWispr-${VERSION}.dmg" \
            "build/EnviousWispr.dmg"

      - name: Skip asset upload (release already exists, not recovery)
        if: steps.check-release.outputs.exists == 'true' && inputs.mode != 'release-only'
        run: echo "==> Release already exists and mode is not release-only — skipping asset upload"

  # ==========================================================================
  # LIMB Job C — Publish Appcast
  # Cannot block shipping. Uses App token exclusively for writes.
  # persist-credentials: false prevents checkout from leaking GITHUB_TOKEN.
  # ==========================================================================
  publish-appcast:
    # #1117: LIMB — checkout + download + python3/xmllint + App token + git push + curl. All Linux-present.
    needs: [preflight, build-release-artifacts, publish-github-release]
    if: |
      always() && (
        github.event_name == 'push' ||
        inputs.mode == 'full' ||
        inputs.mode == 'appcast-only'
      ) && (
        needs.preflight.result == 'success'
      ) && (
        needs.build-release-artifacts.result == 'success' ||
        needs.build-release-artifacts.result == 'skipped'
      )
    runs-on: ubuntu-latest   # #1117: Linux-eligible limb
    # #1019: bumped 10→20 to accommodate the wait-for-Pages-deploy poll before
    # the edge purge + verify (the deploy + edge refresh can take several min).
    timeout-minutes: 20
    permissions:
      contents: read   # checkout + cross-run download (push/PR use the App token) (#1087)
      actions: read
    steps:
      - name: Verify Linux tooling
        run: |
          set -euo pipefail
          # #1117: this job moved to ubuntu-latest. Assert its tools rather than
          # rely on image assumptions; install libxml2-utils if xmllint is absent.
          for tool in git python3 curl; do
            command -v "$tool" >/dev/null || { echo "::error::required tool '$tool' missing on runner"; exit 1; }
            echo "  $tool: $($tool --version 2>&1 | head -n1)"
          done
          if ! command -v xmllint >/dev/null; then
            echo "==> xmllint absent — installing libxml2-utils"
            sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
          fi
          echo "  xmllint: $(xmllint --version 2>&1 | head -n1)"

      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts-${{ needs.preflight.outputs.version }}
          path: build/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.preflight.outputs.source-run-id }}

      - name: Check if appcast entry exists
        id: check-appcast
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          APPCAST="website/public/appcast.xml"
          if [ -f "$APPCAST" ] && grep -qF "<sparkle:version>${VERSION}</sparkle:version>" "$APPCAST"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "==> Appcast entry for v${VERSION} already present — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "==> No appcast entry for v${VERSION} — will inject"
          fi

      - name: Inject appcast entry
        if: steps.check-appcast.outputs.exists == 'false'
        run: |
          APPCAST="website/public/appcast.xml"
          if [ ! -f "$APPCAST" ]; then
            cat > "$APPCAST" << 'FEED'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>EnviousWispr Updates</title>
            </channel>
          </rss>
          FEED
          fi
          python3 -c "
          content = open('website/public/appcast.xml').read()
          entry = open('build/appcast-entry.xml').read()
          content = content.replace('</channel>', entry + '\n    </channel>')
          open('website/public/appcast.xml', 'w').write(content)
          "

      - name: Validate appcast
        if: steps.check-appcast.outputs.exists == 'false'
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          APPCAST="website/public/appcast.xml"
          xmllint --noout "$APPCAST"
          grep -q "<sparkle:version>${VERSION}</sparkle:version>" "$APPCAST"
          grep -q "sparkle:edSignature" "$APPCAST"
          grep -q "github.com/${{ github.repository }}/releases" "$APPCAST"
          echo "==> Appcast validation passed for v${VERSION}"

      - name: DRY RUN — upload injected appcast for inspection
        if: steps.check-appcast.outputs.exists == 'false' && inputs.dry_run == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dry-run-appcast-${{ needs.preflight.outputs.version }}
          retention-days: 7
          path: website/public/appcast.xml

      # #1117 least-privilege: the App token is the load-bearing safety control.
      # In a dry_run the mint is skipped, so APP_TOKEN is empty downstream and any
      # (even accidentally-ungated) push fails auth instead of writing to main.
      - name: Generate GitHub App token
        if: steps.check-appcast.outputs.exists == 'false' && inputs.dry_run != true
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: DRY RUN — appcast push (no-op)
        if: steps.check-appcast.outputs.exists == 'false' && inputs.dry_run == true
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          # #1117: rehearsal — the injected + validated appcast.xml is uploaded as an
          # artifact above; here we only print what a real run would push. No token
          # was minted, so no push is possible.
          echo "DRY RUN: would commit + push website/public/appcast.xml to main:"
          echo "  git commit -m 'chore(release): update appcast for v${VERSION}' && git push origin main"
          git --no-pager diff --stat -- website/public/appcast.xml || true

      - name: Push appcast to main
        id: push-appcast
        if: steps.check-appcast.outputs.exists == 'false' && inputs.dry_run != true
        continue-on-error: true
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          git config user.name "enviouswispr-release-bot[bot]"
          git config user.email "enviouswispr-release-bot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}"
          git add website/public/appcast.xml
          if git diff --staged --quiet; then
            echo "==> appcast.xml unchanged, skipping."
          else
            git commit -m "chore(release): update appcast for v${VERSION}"
            git push origin main
            echo "==> Appcast pushed to main"
          fi

      # ----------------------------------------------------------------------
      # #1019 C2 — instantly-fresh feed at the edge.
      # The appcast push above triggers deploy-blog.yml (paths: website/**) →
      # Cloudflare Pages redeploy. Cloudflare's edge was observed serving the
      # stale appcast well past its TTL (#948), so after the deploy is live we
      # purge the edge for appcast.xml and verify the canonical URL serves the
      # new version. All three steps are limbs (continue-on-error): on failure
      # the release still ships and the feed self-refreshes at max-age=60.
      # ----------------------------------------------------------------------
      - name: Wait for Cloudflare Pages deploy of new appcast
        id: wait-pages
        if: steps.check-appcast.outputs.exists == 'false' && steps.push-appcast.outcome == 'success'
        continue-on-error: true
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          # Cache-bypassing poll: a unique query string misses the Cloudflare
          # edge cache and hits the Pages origin, so this observes the deploy
          # going live (independent of the edge cache state).
          URL="https://enviouswispr.com/appcast.xml?cb=${{ github.run_id }}-${{ github.run_attempt }}"
          for i in $(seq 1 30); do
            if curl -fsS "$URL" | grep -qF "<sparkle:version>${VERSION}</sparkle:version>"; then
              echo "==> Pages origin live with v${VERSION} (attempt ${i})"
              exit 0
            fi
            sleep 15
          done
          echo "::warning::Pages deploy did not surface v${VERSION} within ~7.5m; edge self-refreshes at max-age=60."
          exit 1

      - name: Purge Cloudflare edge cache for appcast
        id: purge-edge
        if: steps.check-appcast.outputs.exists == 'false' && steps.push-appcast.outcome == 'success' && steps.wait-pages.outcome == 'success' && inputs.dry_run != true
        continue-on-error: true
        env:
          CF_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
        run: |
          # Scoped cache-purge token (single zone: enviouswispr.com). Bearer auth.
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/b4416a0f0ebd699e96969a331c7ad7ff/purge_cache" \
            -H "Authorization: Bearer ${CF_PURGE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://enviouswispr.com/appcast.xml"]}'
          echo ""
          echo "==> Requested edge purge for appcast.xml"

      - name: Verify canonical appcast serves new version
        if: steps.check-appcast.outputs.exists == 'false' && steps.push-appcast.outcome == 'success' && steps.wait-pages.outcome == 'success'
        continue-on-error: true
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          # The canonical (cacheable) URL must serve the new version after purge.
          for i in $(seq 1 6); do
            if curl -fsS "https://enviouswispr.com/appcast.xml" | grep -qF "<sparkle:version>${VERSION}</sparkle:version>"; then
              echo "==> Canonical appcast.xml now serves v${VERSION} (attempt ${i})"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Canonical appcast.xml still stale after purge; edge self-refreshes at max-age=60."
          # Surface as a failed-but-nonblocking limb (continue-on-error) so a
          # stale-after-purge is visible in the run, not a silent green.
          exit 1

      - name: Fallback — open appcast PR
        id: fallback-pr
        if: steps.check-appcast.outputs.exists == 'false' && steps.push-appcast.outcome == 'failure' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          BRANCH="chore/appcast-v${VERSION}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(release): update appcast for v${VERSION}" \
            --body "Automated appcast update for v${VERSION}. Direct push to main failed — manual merge required." \
            --base main \
            --head "$BRANCH"
          echo "::warning::Direct push to main failed. Appcast PR opened on branch ${BRANCH}."

      - name: Report appcast failure
        if: >
          steps.check-appcast.outputs.exists == 'false' &&
          steps.push-appcast.outcome == 'failure' &&
          steps.fallback-pr.outcome == 'failure'
        run: |
          echo "::error::Both direct push and PR fallback failed for appcast. Manual intervention required."
          echo "::error::Run: gh workflow run release.yml -f mode=appcast-only -f tag=${{ needs.preflight.outputs.tag }} -f source_run_id=${{ needs.preflight.outputs.source-run-id }}"
          exit 1

  # ==========================================================================
  # LIMB Job D — Upload Sentry dSYMs
  # Cannot block shipping. Installs a pinned, checksummed sentry-cli (#1129).
  # ==========================================================================
  upload-sentry-dsyms:
    needs: [preflight, build-release-artifacts, publish-github-release]
    if: |
      always() && (
        github.event_name == 'push' ||
        inputs.mode == 'full' ||
        inputs.mode == 'sentry-only'
      ) && (
        needs.preflight.result == 'success'
      ) && (
        needs.build-release-artifacts.result == 'success' ||
        needs.build-release-artifacts.result == 'skipped'
      )
    runs-on: ubuntu-latest   # #1117: Linux-eligible limb (sentry-cli installs + runs on Linux)
    timeout-minutes: 15
    permissions:
      contents: read   # checkout + cross-run download (Sentry upload uses its own token) (#1087)
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download dSYM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dsym-artifacts-${{ needs.preflight.outputs.version }}
          path: build/dSYMs/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.preflight.outputs.source-run-id }}

      - name: Install sentry-cli
        env:
          # Pin sentry-cli to a checksummed GitHub release binary instead of the
          # unpinned `curl https://sentry.io/get-cli/ | bash` installer. The next
          # step exposes SENTRY_AUTH_TOKEN (an org-scoped Sentry API token), so a
          # compromised installer endpoint could otherwise persist a shim that
          # exfiltrates it. (#1129)
          # Bump: set VERSION + SHA256 together — sha256 of sentry-cli-Linux-x86_64.
          SENTRY_CLI_VERSION: "3.5.1"
          SENTRY_CLI_SHA256: 50a1618336cdbb908e5559d6b941f3aa0ef5f341abeca08de40ed8c0070450b4
        run: |
          set -euo pipefail
          # #1117 moved this limb to ubuntu-latest (x86_64 Linux), so fetch the Linux binary, not Darwin (#1139).
          [ "$(uname -m)" = x86_64 ] || { echo "::error::Expected x86_64 runner, got $(uname -m)"; exit 1; }
          SENTRY_URL="https://github.com/getsentry/sentry-cli/releases/download/${SENTRY_CLI_VERSION}/sentry-cli-Linux-x86_64"
          SENTRY_TMP="$RUNNER_TEMP/sentry-cli"
          echo "==> Downloading pinned sentry-cli ${SENTRY_CLI_VERSION} from ${SENTRY_URL}"
          curl --proto '=https' --tlsv1.2 --fail --location \
            --retry 3 --retry-connrefused --connect-timeout 15 --max-time 120 \
            -sS -o "$SENTRY_TMP" "$SENTRY_URL"
          echo "${SENTRY_CLI_SHA256}  ${SENTRY_TMP}" | shasum -a 256 -c -
          mkdir -p "$HOME/.local/bin"
          chmod +x "$SENTRY_TMP"
          mv "$SENTRY_TMP" "$HOME/.local/bin/sentry-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/sentry-cli" --version | grep -qF "$SENTRY_CLI_VERSION" \
            || { echo "::error::sentry-cli version mismatch (expected $SENTRY_CLI_VERSION)"; exit 1; }

      - name: Verify dSYMs present and parseable
        run: |
          set -euo pipefail
          DSYM_DIR="build/dSYMs"
          # First-party dSYMs we triage crashes on. The archive also ships ~5 Sparkle
          # dSYMs (Sparkle.framework / Autoupdate / Updater.app / Installer.xpc / Downloader.xpc),
          # which are uploaded too but NOT gated on (that set drifts with Sparkle versions).
          FIRST_PARTY=(EnviousWispr.app.dSYM EnviousWisprAudioService.xpc.dSYM EnviousWisprASRService.xpc.dSYM)
          missing=0
          for b in "${FIRST_PARTY[@]}"; do
            [ -d "$DSYM_DIR/$b" ] || { echo "::error::missing first-party dSYM: $b"; missing=1; }
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::dSYM guard failed (empty / mis-staged artifact). Contents of $DSYM_DIR:"
            ls -1 "$DSYM_DIR" || true
            exit 1
          fi
          for b in "${FIRST_PARTY[@]}"; do
            dwarf=$(find "$DSYM_DIR/$b/Contents/Resources/DWARF" -type f 2>/dev/null | head -1)
            { [ -n "$dwarf" ] && sentry-cli debug-files check "$dwarf" >/dev/null 2>&1; } \
              || { echo "::error::dSYM parse-check failed for $b"; exit 1; }
          done
          echo "==> dSYM guard: all 3 first-party dSYMs present and parseable."

      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VERSION: ${{ needs.preflight.outputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          # sentry-cli is installed (pinned + checksummed) by the prior step; this guard is belt-and-suspenders
          if ! command -v sentry-cli &>/dev/null; then
            echo "::error::sentry-cli not found on PATH. The pinned 'Install sentry-cli' step must have failed."
            exit 1
          fi
          sentry-cli --version

          # #1117: in a dry_run, install + version above prove sentry-cli works on
          # ubuntu; stop before any real Sentry mutation (no release created/uploaded).
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "DRY RUN: would run: sentry-cli releases new v${VERSION}; debug-files upload --include-sources build/dSYMs/; releases finalize v${VERSION}"
            ls -la build/dSYMs/ 2>/dev/null || echo "::warning::dSYMs not found in dry-run download"
            exit 0
          fi

          sentry-cli releases new "v${VERSION}"
          # Commit association is a nice-to-have (suspect-commits), NOT required for
          # symbolication. `set-commits --auto` can hard-fail ("could not find the SHA
          # of the previous release in the git history") — notably on a `mode=sentry-only`
          # RE-RUN, which is exactly #1088's remediation path. --ignore-missing degrades
          # it to default-commits instead of failing the whole dSYM upload; it is a no-op
          # when --auto would have succeeded. Keeps the essential symbol upload unblocked.
          sentry-cli releases set-commits "v${VERSION}" --auto --ignore-missing

          echo "==> Uploading dSYMs ..."
          # --wait-for makes the command fail if the server cannot fully PROCESS the
          # files (processing errors only surface with --wait/--wait-for). A green exit
          # then means "symbols processed", not merely "bytes accepted". 300s < 900s job timeout.
          sentry-cli debug-files upload --include-sources --wait-for 300 build/dSYMs/

          sentry-cli releases finalize "v${VERSION}"
          echo "==> Sentry release v${VERSION} finalized with dSYMs."

  # ==========================================================================
  # Job E — Release Summary
  # Always runs. Single truth source for what shipped and what didn't.
  # ==========================================================================
  release-summary:
    needs: [preflight, build-release-artifacts, publish-github-release, publish-appcast, upload-sentry-dsyms]
    if: always() && needs.preflight.result == 'success'
    runs-on: ubuntu-latest   # #1117: pure-bash summary
    timeout-minutes: 5
    steps:
      - name: Write release summary
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          SOURCE_RUN: ${{ needs.preflight.outputs.source-run-id }}
          MODE: ${{ inputs.mode || 'full' }}
          BUILD_RESULT: ${{ needs.build-release-artifacts.result }}
          RELEASE_RESULT: ${{ needs.publish-github-release.result }}
          APPCAST_RESULT: ${{ needs.publish-appcast.result }}
          SENTRY_RESULT: ${{ needs.upload-sentry-dsyms.result }}
          DRY_RUN: ${{ inputs.dry_run }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # #1117: a dry_run rehearsal ends every job in `success` (mutations are
          # gated/no-op'd), so distinguish it from a real shipped release in the
          # summary — an operator must never read a rehearsal as "shipped".
          if [[ "${DRY_RUN}" == "true" ]]; then
            SUMMARY_TITLE="DRY RUN (rehearsal — nothing shipped) — v${VERSION}"
          else
            SUMMARY_TITLE="Release Summary — v${VERSION}"
          fi

          status_emoji() {
            case "$1" in
              success) echo "✅" ;;
              skipped) echo "⏭️" ;;
              *)       echo "❌" ;;
            esac
          }

          BUILD_STATUS=$(status_emoji "$BUILD_RESULT")
          RELEASE_STATUS=$(status_emoji "$RELEASE_RESULT")
          APPCAST_STATUS=$(status_emoji "$APPCAST_RESULT")
          SENTRY_STATUS=$(status_emoji "$SENTRY_RESULT")

          # Determine if manual follow-up is needed
          NEEDS_FOLLOWUP="No"
          FOLLOWUP_ITEMS=""
          if [[ "$APPCAST_RESULT" != "success" && "$APPCAST_RESULT" != "skipped" ]]; then
            NEEDS_FOLLOWUP="Yes"
            FOLLOWUP_ITEMS="${FOLLOWUP_ITEMS}\n- Appcast: \`gh workflow run release.yml -f mode=appcast-only -f tag=${TAG} -f source_run_id=${SOURCE_RUN}\`"
          fi
          if [[ "$SENTRY_RESULT" != "success" && "$SENTRY_RESULT" != "skipped" ]]; then
            NEEDS_FOLLOWUP="Yes"
            FOLLOWUP_ITEMS="${FOLLOWUP_ITEMS}\n- Sentry: \`gh workflow run release.yml -f mode=sentry-only -f tag=${TAG} -f source_run_id=${SOURCE_RUN}\`"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## ${SUMMARY_TITLE}

          | Component | Status | Type |
          |---|---|---|
          | Build/Package | ${BUILD_STATUS} \`${BUILD_RESULT}\` | **HEART** |
          | GitHub Release | ${RELEASE_STATUS} \`${RELEASE_RESULT}\` | **HEART** |
          | Appcast | ${APPCAST_STATUS} \`${APPCAST_RESULT}\` | limb |
          | Sentry dSYMs | ${SENTRY_STATUS} \`${SENTRY_RESULT}\` | limb |

          | Detail | Value |
          |---|---|
          | Mode | \`${MODE}\` |
          | Source run ID | \`${SOURCE_RUN}\` |
          | Manual follow-up needed | **${NEEDS_FOLLOWUP}** |
          SUMMARY

          if [[ "$NEEDS_FOLLOWUP" == "Yes" ]]; then
            echo -e "\n### Recovery commands\n${FOLLOWUP_ITEMS}" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Fail the summary job only if HEART jobs failed
          if [[ "$BUILD_RESULT" != "success" && "$BUILD_RESULT" != "skipped" ]]; then
            echo "::error::HEART FAILURE: Build failed — release did not ship"
            exit 1
          fi
          if [[ "$RELEASE_RESULT" != "success" && "$RELEASE_RESULT" != "skipped" ]]; then
            echo "::error::HEART FAILURE: GitHub Release failed — release did not ship"
            exit 1
          fi

          # #1117: dry_run rehearsal — report as a rehearsal, never as "shipped".
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "==> DRY RUN v${VERSION} complete — pipeline rehearsed on its runners, NOTHING shipped (no GitHub Release, no appcast push, no Sentry upload)."
            exit 0
          fi

          # Limb failures are warnings, not errors. Reaching here means we passed the
          # heart-failure exit guards AND the dry_run gate above, so this is a real
          # release that actually shipped. Push a proactive Discord alert (the backup
          # for unattended releases). Non-blocking: it can never fail the summary job,
          # but its absence/failure is made VISIBLE (#1088).
          if [[ "$NEEDS_FOLLOWUP" == "Yes" ]]; then
            echo "::warning::Limb failures detected — release shipped but follow-up needed. See summary for recovery commands."
            if [[ -z "${DISCORD_RELEASE_WEBHOOK:-}" ]]; then
              echo "::warning::DISCORD_RELEASE_WEBHOOK not configured — proactive alert NOT sent."
              echo "| Discord alert | NOT configured |" >> "$GITHUB_STEP_SUMMARY"
            else
              MSG=$(printf 'RELEASE FOLLOW-UP NEEDED. v%s shipped to users, but a release limb needs attention.\nFollow-up:%b\nRun: %s\nSentry: %s / %s' \
                "$VERSION" "${FOLLOWUP_ITEMS}" "$RUN_URL" "${SENTRY_ORG:-?}" "${SENTRY_PROJECT:-?}")
              PAYLOAD=$(python3 -c 'import json,sys; print(json.dumps({"content": sys.argv[1]}))' "$MSG")
              CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$DISCORD_RELEASE_WEBHOOK" \
                -H "Content-Type: application/json" -d "$PAYLOAD" || echo "000")
              if [[ "$CODE" == "204" || "$CODE" == "200" ]]; then
                echo "| Discord alert | sent ($CODE) |" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "::warning::Discord alert POST failed (HTTP $CODE) — GitHub summary is the fallback record."
                echo "| Discord alert | attempted, failed ($CODE) |" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          else
            echo "==> Release v${VERSION} fully shipped. All components successful."
          fi
