<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Scene 07 — Explainer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f0a1a;
    font-family: 'Inter', system-ui, sans-serif;
    position: relative;
  }
  .scene-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  @keyframes rainbow-shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  .footer-wrap {
    position: absolute;
    bottom: 4%;
    left: 0;
    right: 0;
    text-align: center;
    padding: 0 80px;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.95));
  }
  .footer-rainbow {
    font-size: 38px;
    font-weight: 700;
    line-height: 1.3;
    background: linear-gradient(90deg, #ff6b9d, #c44dff, #6b8aff, #44d4ff, #6bffa3, #ffd944, #ff6b9d);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow-shimmer 3s linear infinite;
    display: inline-block;
  }
</style>
</head>
<body>
  <img class="scene-img" src="../originals/scene-07-explainer.png" alt="Explainer scene">
  <div class="footer-wrap">
    <span class="footer-rainbow">Available now for macOS</span>
  </div>
</body>
</html>
