<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Scene 09 — Reveal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f0a1a;
    font-family: 'Inter', system-ui, sans-serif;
    position: relative;
  }
  .scene-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  @keyframes rainbow-shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  .header-wrap {
    position: absolute;
    top: 6%;
    left: 0;
    right: 0;
    text-align: center;
    padding: 0 80px;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.95));
  }
  .header-wrap h2 {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.4;
    color: #ffffff;
    display: block;
    filter: none;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
  }
  .header-wrap h2 .plain {
    color: #ffffff;
    -webkit-text-fill-color: #ffffff;
    background: none;
  }
  .header-wrap h2 .rainbow {
    background: linear-gradient(90deg, #ff6b9d, #c44dff, #6b8aff, #44d4ff, #6bffa3, #ffd944, #ff6b9d);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow-shimmer 3s linear infinite;
    display: inline;
    text-shadow: none;
    filter: none;
  }
  .footer {
    position: absolute;
    bottom: 4%;
    left: 0;
    right: 0;
    text-align: center;
    padding: 0 80px;
    color: #ffffff;
    font-size: 32px;
    font-weight: 500;
    line-height: 1.6;
    white-space: pre-line;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
  }
</style>
</head>
<body>
  <img class="scene-img" src="../originals/scene-08-reveal.png" alt="Reveal scene">
  <div class="header-wrap">
    <h2><span class="plain">All of this... </span><span class="rainbow">was two of us.</span></h2>
  </div>
  <div class="footer">No investors. No employees.
Just a hoodie, a laptop, and Claude Code.</div>
</body>
</html>
