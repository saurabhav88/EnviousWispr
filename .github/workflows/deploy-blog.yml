name: Deploy Website

on:
  push:
    branches: [main]
    paths: ['website/**']
  schedule:
    # Daily rebuild at 14:07 UTC (~10:07 America/New_York) so future-dated blog
    # posts go live on their pubDate without a push. The build recomputes
    # "today" in Eastern (see website/src/utils/posts.ts isPublishedPost), so a
    # post dated for today becomes visible on the first run on/after that date.
    # Runs well after midnight ET in both EST and EDT, so posts always publish
    # on the correct calendar day. Safe to leave on year-round (a day with no
    # newly-due post just redeploys identical output).
    - cron: '7 14 * * *'
  workflow_dispatch: # Manual trigger

concurrency:
  group: deploy-blog
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build Astro site
        working-directory: website
        run: npm run build

      - name: Verify build output
        working-directory: website
        run: |
          if [ ! -d "dist" ]; then
            echo "Build output directory dist/ does not exist"
            exit 1
          fi
          echo "Build output verified"

      - name: Deploy to Cloudflare Pages
        working-directory: website
        run: npx wrangler pages deploy dist/ --project-name=enviouswispr --branch=main
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Tell IndexNow (Bing/Yandex/Naver) about posts that go live TODAY only.
      # Submitting just the newly-published URLs (not a daily blast of every URL)
      # is the protocol's intended use. Runs only after a successful deploy, and
      # is non-fatal: a flaky IndexNow response must not redden a good publish.
      # "Today" is computed in America/New_York to match the build-time
      # visibility gate in website/src/utils/posts.ts (isPublishedPost).
      - name: Notify IndexNow for posts published today
        if: success()
        continue-on-error: true
        working-directory: website
        run: |
          TODAY="$(TZ=America/New_York date +%F)"
          urls=()
          for f in src/content/blog/*.md; do
            pd="$(grep -m1 '^pubDate:' "$f" | sed -E 's/^pubDate:[[:space:]]*//; s/"//g' | cut -dT -f1)"
            draft="$(grep -m1 '^draft:' "$f" | sed -E 's/^draft:[[:space:]]*//; s/"//g')"
            if [ "$pd" = "$TODAY" ] && [ "$draft" != "true" ]; then
              urls+=("https://enviouswispr.com/blog/$(basename "$f" .md)/")
            fi
          done
          if [ "${#urls[@]}" -eq 0 ]; then
            echo "No blog posts dated $TODAY (ET); nothing to submit to IndexNow."
            exit 0
          fi
          echo "Submitting ${#urls[@]} URL(s) published today to IndexNow:"
          printf '  %s\n' "${urls[@]}"
          bash scripts/indexnow-submit.sh "${urls[@]}"
