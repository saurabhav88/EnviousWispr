<?xml version="1.0" encoding="UTF-8"?>
<svg width="16" height="16" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="squircle">
    <path d="M128,2 C186,2 210,2 230,22 C254,42 254,70 254,128 C254,186 254,210 234,230 C214,254 186,254 128,254 C70,254 46,254 26,234 C2,214 2,186 2,128 C2,70 2,46 22,26 C42,2 70,2 128,2Z"/>
  </clipPath>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="particleGlow">
    <feGaussianBlur stdDeviation="2"/>
  </filter>
  <radialGradient id="bgGrad" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#1a0a2e"/>
    <stop offset="100%" stop-color="#0d0d14"/>
  </radialGradient>
</defs>
<g clip-path="url(#squircle)">
