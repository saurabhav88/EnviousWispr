name: Deploy Website

on:
  push:
    branches: [main]
    paths: ['website/**']
  schedule:
    # Daily at 14:07 UTC (~9:07 AM ET / 10:07 AM EDT)
    # Publishes scheduled blog posts whose pubDate has arrived
    - cron: '7 14 * * *'
  workflow_dispatch: # Manual trigger

concurrency:
  group: deploy-blog
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build Astro site
        working-directory: website
        run: npm run build

      - name: Verify build output
        working-directory: website
        run: |
          if [ ! -d "dist/client" ]; then
            echo "Build output directory dist/client/ does not exist"
            exit 1
          fi
          echo "Build output verified"

      - name: Deploy to Cloudflare Pages
        working-directory: website
        run: npx wrangler pages deploy dist/client/ --project-name=enviouswispr --branch=main
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
