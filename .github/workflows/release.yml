name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: [self-hosted, enviouswispr-release]
    timeout-minutes: 330
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify SDK supports FoundationModels
        run: |
          set -euo pipefail

          echo "==> Environment diagnostics"
          swift --version
          SDK_VER="$(xcrun --sdk macosx --show-sdk-version)"
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "macOS SDK: $SDK_VER"
          echo "SDK path: $SDK_PATH"

          # Xcode check — optional (CLT shim exists but fails without full Xcode)
          XCODE_VER="$(xcodebuild -version 2>/dev/null | head -n1 || true)"
          if [ -n "$XCODE_VER" ]; then
            echo "Xcode: $XCODE_VER"
          else
            echo "Xcode: not installed (Command Line Tools only)"
          fi

          if [ "$(printf '%s\n' "26.0" "$SDK_VER" | sort -V | head -n1)" != "26.0" ]; then
            echo "::error::macOS SDK 26.0+ required for FoundationModels (found: $SDK_VER)"
            exit 1
          fi

          cat > foundation_models_probe.swift <<'PROBE'
          import Foundation
          import FoundationModels

          // Minimal type reference so this is a real compile gate, not just syntax.
          func _probe() {
            _ = SystemLanguageModel.default
          }
          PROBE

          xcrun swiftc \
            -sdk "$SDK_PATH" \
            -target arm64-apple-macos26.0 \
            foundation_models_probe.swift \
            -o /tmp/foundation_models_probe

          echo "==> FoundationModels compile probe PASSED"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache SPM dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build release binary
        run: |
          echo "==> Building arm64 release binary ..."
          swift build -c release --arch arm64
          echo "==> Build complete."

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 32)"
          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Package and sign DMG
        env:
          CODESIGN_IDENTITY: "Developer ID Application: ${{ secrets.APPLE_TEAM_NAME }} (${{ secrets.APPLE_TEAM_ID }})"
          SPARKLE_FEED_URL: "https://enviouswispr.com/appcast.xml"
          SPARKLE_EDDSA_PUBLIC_KEY: ${{ secrets.SPARKLE_EDDSA_PUBLIC_KEY }}
        run: |
          if [[ -z "${SPARKLE_EDDSA_PUBLIC_KEY}" ]]; then
            echo "::error::SPARKLE_EDDSA_PUBLIC_KEY secret is not set"
            exit 1
          fi
          ./scripts/build-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="build/EnviousWispr-${VERSION}.dmg"

          # Write API key from base64 secret to temp file
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo -n "${APPLE_API_KEY_BASE64}" | base64 --decode -o "${KEY_PATH}"

          echo "==> Submitting ${DMG_PATH} for notarization (--wait, 5h timeout) ..."
          # Use --wait so notarytool handles polling internally (exponential backoff).
          # Timeout 18000s = 5h, safely under GitHub's 6h job limit.
          SUBMIT_OUTPUT=$(xcrun notarytool submit "${DMG_PATH}" \
            --key "${KEY_PATH}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --wait --timeout 18000 2>&1) || true

          echo "${SUBMIT_OUTPUT}"
          SUBMISSION_ID=$(echo "${SUBMIT_OUTPUT}" | grep "id:" | head -1 | awk '{print $2}')

          if echo "${SUBMIT_OUTPUT}" | grep -q "status: Accepted"; then
            echo "==> Notarization accepted. Stapling ..."
            xcrun stapler staple "${DMG_PATH}"
            echo "==> Stapled. Done."
            rm -f "${KEY_PATH}"
          elif echo "${SUBMIT_OUTPUT}" | grep -q "status: Invalid"; then
            echo "::error::Notarization REJECTED — fetching log for details"
            xcrun notarytool log "${SUBMISSION_ID}" \
              --key "${KEY_PATH}" \
              --key-id "${APPLE_API_KEY_ID}" \
              --issuer "${APPLE_API_ISSUER_ID}" 2>&1 || true
            rm -f "${KEY_PATH}"
            exit 1
          else
            echo "::error::Notarization did not complete — last output above"
            rm -f "${KEY_PATH}"
            exit 1
          fi

      - name: Upload dSYMs to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          # Install sentry-cli (pinned version, explicit install dir for self-hosted runner)
          export INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION=2.39.1 bash
          export PATH="$INSTALL_DIR:$PATH"

          # Create release and associate commits
          sentry-cli releases new "v${VERSION}"
          sentry-cli releases set-commits "v${VERSION}" --auto

          # Upload debug symbols — --arch arm64 puts artifacts in arch-specific dir
          echo "==> Uploading dSYMs ..."
          sentry-cli debug-files upload --include-sources .build/arm64-apple-macosx/release/

          # Finalize release
          sentry-cli releases finalize "v${VERSION}"
          echo "==> Sentry release v${VERSION} finalized with dSYMs."

      - name: Generate Sparkle appcast entry
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="build/EnviousWispr-${VERSION}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          DATE=$(date -R)

          # Sign the DMG with Sparkle's EdDSA key — fail if signature is empty
          if [[ -z "${SPARKLE_PRIVATE_KEY}" ]]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set — cannot sign update"
            exit 1
          fi
          EDDSA_SIG=$(echo "${SPARKLE_PRIVATE_KEY}" | .build/artifacts/sparkle/Sparkle/bin/sign_update -p "${DMG_PATH}" --ed-key-file /dev/stdin 2>/dev/null || echo "")
          if [[ -z "${EDDSA_SIG}" ]]; then
            echo "::error::Sparkle EdDSA signature is empty — sign_update failed"
            exit 1
          fi

          mkdir -p build
          cat > build/appcast-entry.xml << ENTRY
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/EnviousWispr-${VERSION}.dmg"
                  length="${DMG_SIZE}"
                  type="application/octet-stream"
                  sparkle:edSignature="${EDDSA_SIG}"
                />
              </item>
          ENTRY

      - name: Update appcast.xml
        run: |
          if [ ! -f appcast.xml ]; then
            cat > appcast.xml << 'FEED'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>EnviousWispr Updates</title>
            </channel>
          </rss>
          FEED
          fi
          # Insert new entry before closing </channel>
          python3 -c "
          content = open('appcast.xml').read()
          entry = open('build/appcast-entry.xml').read()
          content = content.replace('</channel>', entry + '\n    </channel>')
          open('appcast.xml', 'w').write(content)
          "
          cp appcast.xml website/public/appcast.xml

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Copy versioned DMG to a fixed-name asset for direct download links.
          # Website uses: /releases/latest/download/EnviousWispr.dmg
          cp "build/EnviousWispr-${VERSION}.dmg" "build/EnviousWispr.dmg"
          gh release create "v${VERSION}" \
            --title "EnviousWispr v${VERSION}" \
            --generate-notes \
            "build/EnviousWispr-${VERSION}.dmg" \
            "build/EnviousWispr.dmg"

      - name: Open appcast PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git fetch origin main
          git checkout main

          BRANCH="chore/appcast-v${VERSION}"
          git checkout -b "$BRANCH"
          git add -f appcast.xml website/public/appcast.xml
          if git diff --staged --quiet; then
            echo "==> appcast.xml unchanged, skipping."
          else
            git commit -m "chore(release): update appcast for v${VERSION}"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "chore(release): update appcast for v${VERSION}" \
              --body "Automated appcast update for v${VERSION}. Merge to push Sparkle update to users." \
              --base main \
              --head "$BRANCH"
          fi

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
