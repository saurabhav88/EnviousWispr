<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnviousWispr — Onboarding Playground</title>
<style>
  :root {
    --bg: #1a1a1e;
    --surface: #2a2a2e;
    --surface2: #333338;
    --text: #e8e8ec;
    --text2: #a0a0a8;
    --text3: #666670;
    --accent: #4a9eff;
    --accent-glow: rgba(74, 158, 255, 0.15);
    --green: #34c759;
    --orange: #ff9f0a;
    --border: #3a3a40;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Left Panel: Controls ── */
  .controls {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .controls h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .controls h1 span { font-size: 18px; }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-group label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-row span {
    font-size: 11px;
    color: var(--text3);
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px;
    border-radius: 8px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .preset-btn:hover {
    background: var(--accent-glow);
    border-color: var(--accent);
  }

  .preset-btn.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .toggle-row span {
    font-size: 12px;
    color: var(--text);
  }

  .toggle {
    width: 36px;
    height: 20px;
    background: var(--surface2);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    border: 1px solid var(--border);
  }

  .toggle.on { background: var(--accent); border-color: var(--accent); }

  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle.on::after { transform: translateX(16px); }

  /* ── Right Panel: Preview + Prompt ── */
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .preview-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
    background-size: 24px 24px;
  }

  /* ── macOS Window ── */
  .mac-window {
    background: var(--win-bg, #1e1e22);
    border-radius: 12px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.4),
      0 0 0 0.5px rgba(255,255,255,0.08);
    overflow: hidden;
    transition: width 0.4s ease, height 0.4s ease;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .mac-window.light-mode {
    --win-bg: #f5f5f7;
    --win-text: #1d1d1f;
    --win-text2: #6e6e73;
    --win-text3: #aeaeb2;
    --win-surface: #ffffff;
    --win-border: #d2d2d7;
    --win-bar: #e8e8ed;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.15),
      0 0 0 0.5px rgba(0,0,0,0.1);
  }

  .mac-window:not(.light-mode) {
    --win-text: #e8e8ec;
    --win-text2: #a0a0a8;
    --win-text3: #666670;
    --win-surface: #2a2a2e;
    --win-border: #3a3a40;
    --win-bar: #2a2a2e;
  }

  .window-titlebar {
    height: 38px;
    background: var(--win-bar);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    border-bottom: 1px solid rgba(128,128,128,0.15);
    -webkit-user-select: none;
  }

  .traffic-light {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .tl-close { background: #ff5f57; }
  .tl-min { background: #febc2e; }
  .tl-max { background: #28c840; }

  /* ── Progress Bar ── */
  .progress-container {
    padding: 16px 32px 0;
  }

  .progress-track {
    height: 3px;
    background: var(--win-border);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    position: absolute;
    left: 0;
    top: 0;
  }

  /* ── Step Content ── */
  .step-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 40px;
    text-align: center;
    position: relative;
  }

  .step-content.animating-out {
    animation: stepOut 0.3s ease-in forwards;
  }

  .step-content.animating-in {
    animation: stepIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes stepOut {
    to { opacity: 0; transform: translateX(-20px) scale(0.98); }
  }

  @keyframes stepIn {
    from { opacity: 0; transform: translateX(20px) scale(0.98); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }

  .icon-hero {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin-bottom: 20px;
    position: relative;
    transition: transform 0.3s;
  }

  .icon-hero.pulse {
    animation: iconPulse 2s ease-in-out infinite;
  }

  @keyframes iconPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .icon-hero .ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid;
    opacity: 0.3;
    animation: ringPulse 2s ease-in-out infinite;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.1); opacity: 0; }
  }

  .step-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--win-text);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .step-subtitle {
    font-size: 15px;
    color: var(--win-text2);
    line-height: 1.5;
    max-width: 340px;
  }

  .step-action {
    margin-top: 24px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .granted-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--green);
    font-size: 14px;
    font-weight: 600;
    animation: badgeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes badgeIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .hint-text {
    font-size: 12px;
    color: var(--win-text3);
    margin-top: 8px;
  }

  /* ── Try It Step: Waveform ── */
  .waveform-container {
    width: 280px;
    height: 64px;
    margin: 16px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    position: relative;
  }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    transition: height 0.1s ease;
  }

  .transcript-output {
    min-height: 48px;
    padding: 12px 20px;
    background: var(--win-surface);
    border: 1px solid var(--win-border);
    border-radius: 10px;
    font-size: 16px;
    color: var(--win-text);
    max-width: 360px;
    width: 100%;
    text-align: left;
    line-height: 1.5;
    position: relative;
    overflow: hidden;
  }

  .transcript-cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--accent);
    margin-left: 1px;
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .record-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 3px solid #ff3b30;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    position: relative;
  }

  .record-inner {
    width: 24px;
    height: 24px;
    background: #ff3b30;
    border-radius: 50%;
    transition: all 0.3s;
  }

  .record-btn.recording .record-inner {
    border-radius: 4px;
    width: 18px;
    height: 18px;
  }

  .record-btn.recording {
    border-color: #ff3b30;
    box-shadow: 0 0 0 4px rgba(255, 59, 48, 0.2);
  }

  /* ── Keycap ── */
  .keycap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 64px;
    height: 56px;
    padding: 0 16px;
    background: var(--win-surface);
    border: 1px solid var(--win-border);
    border-bottom-width: 3px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--win-text);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
  }

  .keycap:hover {
    border-color: var(--accent);
  }

  .keycap.pressed {
    transform: translateY(2px);
    border-bottom-width: 1px;
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 16px rgba(74, 158, 255, 0.3);
  }

  .keycap-hint {
    font-size: 12px;
    color: var(--win-text3);
    margin-top: 12px;
  }

  .keycap-hint.active {
    color: #ff3b30;
    font-weight: 500;
  }

  /* ── Ready Step: Feature List ── */
  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: left;
    margin-top: 16px;
  }

  .feature-item {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateY(8px);
    animation: featureIn 0.4s ease forwards;
  }

  .feature-item:nth-child(1) { animation-delay: 0.1s; }
  .feature-item:nth-child(2) { animation-delay: 0.25s; }
  .feature-item:nth-child(3) { animation-delay: 0.4s; }

  @keyframes featureIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .feature-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .feature-label {
    font-size: 14px;
    color: var(--win-text);
    font-weight: 500;
  }

  .feature-desc {
    font-size: 12px;
    color: var(--win-text2);
  }

  .hotkey-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--win-surface);
    border: 1px solid var(--win-border);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 14px;
    color: var(--win-text);
    font-weight: 500;
    margin-top: 16px;
  }

  .hotkey-badge.glow {
    animation: hotKeyPulse 2s ease-in-out infinite;
  }

  @keyframes hotKeyPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74, 158, 255, 0); }
    50% { box-shadow: 0 0 0 6px rgba(74, 158, 255, 0.1); }
  }

  /* ── Navigation ── */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px 20px;
  }

  .nav-btn {
    background: transparent;
    border: none;
    color: var(--win-text2);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
  }

  .nav-btn:hover { color: var(--win-text); background: rgba(128,128,128,0.1); }

  .nav-btn.primary {
    background: var(--accent);
    color: white;
    font-weight: 600;
    padding: 8px 20px;
  }

  .nav-btn.primary:hover { filter: brightness(1.1); }

  .nav-btn.finish {
    background: var(--green);
    color: white;
    font-weight: 600;
    padding: 8px 20px;
  }

  .nav-btn.finish:hover { filter: brightness(1.1); }

  .step-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--win-text3);
    transition: all 0.3s;
    cursor: pointer;
  }

  .step-dot.active {
    width: 20px;
    border-radius: 3px;
    background: var(--accent);
  }

  .step-dot.completed {
    background: var(--green);
  }

  /* ── Confetti ── */
  .confetti-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 1px;
    pointer-events: none;
    animation: confettiFall 1.5s ease-out forwards;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(120px) rotate(720deg) scale(0.5); }
  }

  /* ── Prompt Output ── */
  .prompt-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 180px;
    overflow-y: auto;
  }

  .prompt-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .prompt-header span {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover {
    background: var(--accent-glow);
    border-color: var(--accent);
  }

  .prompt-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
</style>
</head>
<body>

<!-- ── Controls Panel ── -->
<div class="controls">
  <h1><span>&#127908;</span> Onboarding Playground</h1>

  <div class="control-group">
    <label>Presets</label>
    <div class="preset-grid">
      <button class="preset-btn active" id="preset-default" onclick="applyPreset('default', this)">Default</button>
      <button class="preset-btn" id="preset-compact" onclick="applyPreset('compact', this)">Compact</button>
      <button class="preset-btn" id="preset-spacious" onclick="applyPreset('spacious', this)">Spacious</button>
      <button class="preset-btn" id="preset-minimal" onclick="applyPreset('minimal', this)">Minimal</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Appearance</label>
    <div class="toggle-row">
      <span>Dark Mode</span>
      <div class="toggle on" id="darkToggle" onclick="toggleDark()"></div>
    </div>
  </div>

  <div class="control-group">
    <label>Window Size</label>
    <div class="control-row">
      <input type="range" min="480" max="640" value="560" id="winWidth" oninput="updateState()">
      <span id="winWidthVal">560</span>
    </div>
    <div class="control-row">
      <input type="range" min="380" max="560" value="480" id="winHeight" oninput="updateState()">
      <span id="winHeightVal">480</span>
    </div>
  </div>

  <div class="control-group">
    <label>Accent Color</label>
    <select id="accentColor" onchange="updateState()">
      <option value="#4a9eff">Blue (System)</option>
      <option value="#5e5ce6">Purple</option>
      <option value="#30d158">Green</option>
      <option value="#ff6482">Pink</option>
      <option value="#ff9f0a">Orange</option>
      <option value="#64d2ff">Teal</option>
    </select>
  </div>

  <div class="control-group">
    <label>Progress Style</label>
    <select id="progressStyle" onchange="updateState()">
      <option value="bar">Thin Bar</option>
      <option value="dots">Dots</option>
      <option value="none">None</option>
    </select>
  </div>

  <div class="control-group">
    <label>Animation Speed</label>
    <div class="control-row">
      <input type="range" min="0.3" max="1.5" step="0.1" value="0.6" id="animSpeed" oninput="updateState()">
      <span id="animSpeedVal">0.6s</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Options</label>
    <div class="toggle-row">
      <span>Try-It Step</span>
      <div class="toggle on" id="tryItToggle" onclick="toggleTryIt()"></div>
    </div>
    <div class="toggle-row">
      <span>Confetti on Ready</span>
      <div class="toggle on" id="confettiToggle" onclick="toggleConfetti()"></div>
    </div>
    <div class="toggle-row">
      <span>Pulsing Icons</span>
      <div class="toggle on" id="pulseToggle" onclick="togglePulse()"></div>
    </div>
    <div class="toggle-row">
      <span>Hotkey Hint Glow</span>
      <div class="toggle on" id="glowToggle" onclick="toggleGlow()"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Jump to Step</label>
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
      <button class="preset-btn" onclick="goToStep(0)" style="flex:1">Welcome</button>
      <button class="preset-btn" onclick="goToStep(1)" style="flex:1">Mic</button>
      <button class="preset-btn" onclick="goToStep(2)" style="flex:1">Try It</button>
      <button class="preset-btn" onclick="goToStep(3)" style="flex:1">Access</button>
      <button class="preset-btn" onclick="goToStep(4)" style="flex:1">Ready</button>
    </div>
  </div>
</div>

<!-- ── Preview + Prompt ── -->
<div class="right-panel">
  <div class="preview-area">
    <div class="mac-window" id="macWindow">
      <div class="window-titlebar">
        <div class="traffic-light tl-close"></div>
        <div class="traffic-light tl-min"></div>
        <div class="traffic-light tl-max"></div>
      </div>

      <div class="progress-container" id="progressContainer"></div>
      <div class="step-content" id="stepContent"></div>

      <div class="nav-bar">
        <button class="nav-btn" id="backBtn" onclick="prevStep()">&larr; Back</button>
        <div class="step-dots" id="stepDots"></div>
        <button class="nav-btn primary" id="nextBtn" onclick="nextStep()">Continue &rarr;</button>
      </div>
    </div>
  </div>

  <div class="prompt-area">
    <div class="prompt-header">
      <span>Design Prompt</span>
      <button class="copy-btn" onclick="copyPrompt()">Copy</button>
    </div>
    <div class="prompt-text" id="promptText"></div>
  </div>
</div>

<script>
  // ── State ──
  var DEFAULTS = {
    winWidth: 560, winHeight: 480, accentColor: '#4a9eff',
    progressStyle: 'bar', animSpeed: 0.6, darkMode: true,
    tryItStep: true, confetti: true, pulsingIcons: true, hotkeyGlow: true
  };

  var state = {
    winWidth: 560, winHeight: 480, accentColor: '#4a9eff',
    progressStyle: 'bar', animSpeed: 0.6, darkMode: true,
    tryItStep: true, confetti: true, pulsingIcons: true, hotkeyGlow: true,
    currentStep: 0, micGranted: false, axGranted: false, isRecording: false
  };

  var waveInterval = null;
  var typeInterval = null;

  function getSteps() {
    var steps = ['welcome', 'mic'];
    if (state.tryItStep) steps.push('tryit');
    steps.push('accessibility', 'ready');
    return steps;
  }

  // ── Update from controls ──
  function updateState() {
    state.winWidth = +document.getElementById('winWidth').value;
    state.winHeight = +document.getElementById('winHeight').value;
    state.accentColor = document.getElementById('accentColor').value;
    state.progressStyle = document.getElementById('progressStyle').value;
    state.animSpeed = +document.getElementById('animSpeed').value;
    document.getElementById('winWidthVal').textContent = state.winWidth;
    document.getElementById('winHeightVal').textContent = state.winHeight;
    document.getElementById('animSpeedVal').textContent = state.animSpeed + 's';
    renderAll();
  }

  // ── Master Render ──
  function renderAll() {
    var win = document.getElementById('macWindow');
    win.style.width = state.winWidth + 'px';
    win.style.height = state.winHeight + 'px';
    if (state.darkMode) { win.classList.remove('light-mode'); }
    else { win.classList.add('light-mode'); }
    document.documentElement.style.setProperty('--accent', state.accentColor);
    document.documentElement.style.setProperty('--accent-glow', state.accentColor + '26');
    renderProgress();
    renderStepContent();
    renderNav();
    updatePrompt();
  }

  // ── Progress ──
  function renderProgress() {
    var container = document.getElementById('progressContainer');
    var steps = getSteps();
    var pct = (state.currentStep / (steps.length - 1)) * 100;

    if (state.progressStyle === 'none') {
      container.textContent = '';
      return;
    }

    if (state.progressStyle === 'dots') {
      var dotsDiv = document.createElement('div');
      dotsDiv.className = 'step-dots';
      dotsDiv.style.justifyContent = 'center';
      dotsDiv.style.padding = '4px 0';
      steps.forEach(function(_, i) {
        var dot = document.createElement('div');
        dot.className = 'step-dot';
        if (i === state.currentStep) dot.classList.add('active');
        else if (i < state.currentStep) dot.classList.add('completed');
        dot.onclick = function() { goToStep(i); };
        dotsDiv.appendChild(dot);
      });
      container.textContent = '';
      container.appendChild(dotsDiv);
      return;
    }

    var gradColor = pct >= 80 ? '#34c759' : state.accentColor;
    var track = document.createElement('div');
    track.className = 'progress-track';
    var fill = document.createElement('div');
    fill.className = 'progress-fill';
    fill.style.width = pct + '%';
    fill.style.background = 'linear-gradient(90deg, ' + state.accentColor + ', ' + gradColor + ')';
    fill.style.transition = 'width ' + state.animSpeed + 's cubic-bezier(0.4,0,0.2,1)';
    track.appendChild(fill);
    container.textContent = '';
    container.appendChild(track);
  }

  // ── Step Content ──
  function renderStepContent() {
    var el = document.getElementById('stepContent');
    var steps = getSteps();
    var step = steps[state.currentStep];
    var accentBg = state.accentColor + '1a';
    var pulse = state.pulsingIcons ? ' pulse' : '';

    // Clear
    el.textContent = '';

    switch(step) {
      case 'welcome':
        el.appendChild(buildIconHero('🎙', accentBg, state.accentColor, pulse));
        el.appendChild(buildTitle('Welcome to EnviousWispr'));
        el.appendChild(buildSubtitle('Your voice, beautifully transcribed.\nPowered by on-device AI that never leaves your Mac.'));
        break;

      case 'mic':
        if (state.micGranted) {
          el.appendChild(buildIconHero('✅', 'rgba(52,199,89,0.15)', null, ''));
          el.appendChild(buildTitle('Microphone Ready'));
          el.appendChild(buildSubtitle('Perfect. We can hear you now.'));
          var badge = document.createElement('div');
          badge.className = 'granted-badge';
          badge.textContent = '✓ Microphone access granted';
          var action = document.createElement('div');
          action.className = 'step-action';
          action.appendChild(badge);
          el.appendChild(action);
        } else {
          el.appendChild(buildIconHero('🎤', 'rgba(255,159,10,0.15)', '#ff9f0a', pulse));
          el.appendChild(buildTitle("Let's Hear Your Voice"));
          el.appendChild(buildSubtitle('EnviousWispr needs microphone access to capture your speech. Everything stays on your Mac.'));
          var btn = document.createElement('button');
          btn.className = 'btn-primary';
          btn.textContent = '🎤 Grant Microphone Access';
          btn.onclick = grantMic;
          var actionDiv = document.createElement('div');
          actionDiv.className = 'step-action';
          actionDiv.appendChild(btn);
          el.appendChild(actionDiv);
        }
        break;

      case 'tryit':
        var title = buildTitle('Try It — Say Something!');
        title.style.fontSize = '20px';
        el.appendChild(title);
        var sub = buildSubtitle('Hold the key below and speak. Release to see your words.');
        sub.style.marginBottom = '16px';
        el.appendChild(sub);

        // Keycap
        var keycap = document.createElement('div');
        keycap.className = 'keycap' + (state.isRecording ? ' pressed' : '');
        keycap.id = 'keycapBtn';
        keycap.textContent = '⌥ Option';
        keycap.onmousedown = function(e) { e.preventDefault(); startHoldRecord(); };
        keycap.onmouseup = function() { stopHoldRecord(); };
        keycap.onmouseleave = function() { if (state.isRecording) stopHoldRecord(); };
        el.appendChild(keycap);

        var keyhint = document.createElement('div');
        keyhint.className = 'keycap-hint' + (state.isRecording ? ' active' : '');
        keyhint.id = 'keycapHint';
        keyhint.textContent = state.isRecording ? '● Recording...' : 'Click and hold to record';
        el.appendChild(keyhint);

        // Waveform
        var waveDiv = document.createElement('div');
        waveDiv.className = 'waveform-container';
        waveDiv.id = 'waveform';
        waveDiv.style.marginTop = '8px';
        el.appendChild(waveDiv);

        // Transcript output
        var tBox = document.createElement('div');
        tBox.className = 'transcript-output';
        tBox.style.marginTop = '12px';
        tBox.id = 'transcriptBox';
        var tText = document.createElement('span');
        tText.id = 'transcriptText';
        tBox.appendChild(tText);
        var cursor = document.createElement('span');
        cursor.className = 'transcript-cursor';
        cursor.style.display = 'none';
        cursor.id = 'transcriptCursor';
        tBox.appendChild(cursor);
        el.appendChild(tBox);

        buildWaveform();
        break;

      case 'accessibility':
        if (state.axGranted) {
          el.appendChild(buildIconHero('✅', 'rgba(52,199,89,0.15)', null, ''));
          el.appendChild(buildTitle('All Permissions Set'));
          el.appendChild(buildSubtitle('We can type your words into any app now.'));
          var axBadge = document.createElement('div');
          axBadge.className = 'granted-badge';
          axBadge.textContent = '✓ Accessibility access granted';
          var axAction = document.createElement('div');
          axAction.className = 'step-action';
          axAction.appendChild(axBadge);
          el.appendChild(axAction);
        } else {
          el.appendChild(buildIconHero('⌨️', 'rgba(255,159,10,0.15)', '#ff9f0a', pulse));
          el.appendChild(buildTitle('One More Thing'));
          el.appendChild(buildSubtitle('To paste transcriptions into your apps, we need Accessibility access. This lets us type your words wherever your cursor is.'));
          var axBtn = document.createElement('button');
          axBtn.className = 'btn-primary';
          axBtn.textContent = '🔓 Open System Settings';
          axBtn.onclick = grantAx;
          var axDiv = document.createElement('div');
          axDiv.className = 'step-action';
          axDiv.appendChild(axBtn);
          el.appendChild(axDiv);
          var hint = document.createElement('div');
          hint.className = 'hint-text';
          hint.textContent = 'Toggle the switch in System Settings, then come back here.';
          el.appendChild(hint);
        }
        break;

      case 'ready':
        var readyIcon = buildIconHero('🎉', 'rgba(52,199,89,0.15)', null, '');
        readyIcon.querySelector('span') || true; // icon is text node
        readyIcon.style.fontSize = '44px';
        el.appendChild(readyIcon);
        el.appendChild(buildTitle("You're Ready to Go"));
        el.appendChild(buildSubtitle('Start dictating with your global hotkey:'));

        var hkBadge = document.createElement('div');
        hkBadge.className = 'hotkey-badge' + (state.hotkeyGlow ? ' glow' : '');
        hkBadge.textContent = '⌥ Left Option (hold to record)';
        el.appendChild(hkBadge);

        var fList = document.createElement('div');
        fList.className = 'feature-list';
        var features = [
          { icon: '🎙', bg: accentBg, label: 'Speak naturally', desc: 'Record with one keypress' },
          { icon: '📋', bg: 'rgba(52,199,89,0.1)', label: 'Auto-paste', desc: 'Text appears where your cursor is' },
          { icon: '✨', bg: 'rgba(175,130,255,0.1)', label: 'AI Polish', desc: 'Clean up grammar in Settings' }
        ];
        features.forEach(function(f) {
          var item = document.createElement('div');
          item.className = 'feature-item';
          var iconDiv = document.createElement('div');
          iconDiv.className = 'feature-icon';
          iconDiv.style.background = f.bg;
          iconDiv.textContent = f.icon;
          item.appendChild(iconDiv);
          var textDiv = document.createElement('div');
          var lbl = document.createElement('div');
          lbl.className = 'feature-label';
          lbl.textContent = f.label;
          textDiv.appendChild(lbl);
          var dsc = document.createElement('div');
          dsc.className = 'feature-desc';
          dsc.textContent = f.desc;
          textDiv.appendChild(dsc);
          item.appendChild(textDiv);
          fList.appendChild(item);
        });
        el.appendChild(fList);

        if (state.confetti) setTimeout(spawnConfetti, 200);
        break;
    }
  }

  // ── DOM Helpers ──
  function buildIconHero(emoji, bg, ringColor, pulseClass) {
    var div = document.createElement('div');
    div.className = 'icon-hero' + pulseClass;
    div.style.background = bg;
    div.textContent = emoji;
    if (ringColor) {
      var ring = document.createElement('div');
      ring.className = 'ring';
      ring.style.borderColor = ringColor;
      div.appendChild(ring);
    }
    return div;
  }

  function buildTitle(text) {
    var div = document.createElement('div');
    div.className = 'step-title';
    div.textContent = text;
    return div;
  }

  function buildSubtitle(text) {
    var div = document.createElement('div');
    div.className = 'step-subtitle';
    // Support \n in subtitles
    var parts = text.split('\n');
    parts.forEach(function(part, i) {
      div.appendChild(document.createTextNode(part));
      if (i < parts.length - 1) div.appendChild(document.createElement('br'));
    });
    return div;
  }

  // ── Navigation ──
  function renderNav() {
    var steps = getSteps();
    var backBtn = document.getElementById('backBtn');
    var nextBtn = document.getElementById('nextBtn');
    var dotsEl = document.getElementById('stepDots');

    backBtn.style.visibility = state.currentStep === 0 ? 'hidden' : 'visible';

    if (state.currentStep === steps.length - 1) {
      nextBtn.className = 'nav-btn finish';
      nextBtn.textContent = 'Get Started ✓';
    } else {
      nextBtn.className = 'nav-btn primary';
      nextBtn.textContent = 'Continue →';
    }

    dotsEl.textContent = '';
    if (state.progressStyle !== 'dots') {
      steps.forEach(function(_, i) {
        var dot = document.createElement('div');
        dot.className = 'step-dot';
        if (i === state.currentStep) dot.classList.add('active');
        else if (i < state.currentStep) dot.classList.add('completed');
        dot.onclick = function() { goToStep(i); };
        dotsEl.appendChild(dot);
      });
    }
  }

  // ── Step Navigation ──
  function goToStep(n) {
    var steps = getSteps();
    if (n < 0 || n >= steps.length || n === state.currentStep) return;
    state.isRecording = false;
    clearInterval(waveInterval);
    clearInterval(typeInterval);

    var el = document.getElementById('stepContent');
    el.classList.add('animating-out');
    el.style.animationDuration = (state.animSpeed * 0.5) + 's';
    setTimeout(function() {
      state.currentStep = n;
      el.classList.remove('animating-out');
      el.classList.add('animating-in');
      el.style.animationDuration = state.animSpeed + 's';
      renderAll();
      setTimeout(function() { el.classList.remove('animating-in'); }, state.animSpeed * 1000);
    }, state.animSpeed * 400);
  }

  function nextStep() { goToStep(state.currentStep + 1); }
  function prevStep() { goToStep(state.currentStep - 1); }

  function grantMic() {
    state.micGranted = true;
    renderStepContent();
    setTimeout(function() { nextStep(); }, 800);
  }

  function grantAx() {
    state.axGranted = true;
    renderStepContent();
    setTimeout(function() { nextStep(); }, 800);
  }

  // ── Waveform + Transcription ──
  function buildWaveform() {
    var container = document.getElementById('waveform');
    if (!container) return;
    for (var i = 0; i < 40; i++) {
      var bar = document.createElement('div');
      bar.className = 'wave-bar';
      bar.style.height = '4px';
      bar.style.background = state.accentColor;
      bar.style.opacity = '0.4';
      container.appendChild(bar);
    }
  }

  function startHoldRecord() {
    if (state.isRecording) return;
    state.isRecording = true;
    var keycap = document.getElementById('keycapBtn');
    var hint = document.getElementById('keycapHint');
    if (keycap) keycap.classList.add('pressed');
    if (hint) { hint.classList.add('active'); hint.textContent = '● Recording...'; }
    startWaveform();
    var txtEl = document.getElementById('transcriptText');
    if (txtEl) txtEl.textContent = '';
    var cursor = document.getElementById('transcriptCursor');
    if (cursor) cursor.style.display = 'inline-block';
  }

  function stopHoldRecord() {
    if (!state.isRecording) return;
    state.isRecording = false;
    var keycap = document.getElementById('keycapBtn');
    var hint = document.getElementById('keycapHint');
    if (keycap) keycap.classList.remove('pressed');
    if (hint) { hint.classList.remove('active'); hint.textContent = 'Transcribing...'; }
    stopWaveform();
    simulateTranscription();
  }

  // Legacy toggle for backward compat
  function toggleRecord() {
    if (state.isRecording) stopHoldRecord();
    else startHoldRecord();
  }

  function startWaveform() {
    var bars = document.querySelectorAll('.wave-bar');
    waveInterval = setInterval(function() {
      bars.forEach(function(bar) {
        var h = 4 + Math.random() * 48;
        bar.style.height = h + 'px';
        bar.style.opacity = String(0.3 + (h / 60) * 0.7);
      });
    }, 80);
  }

  function stopWaveform() {
    clearInterval(waveInterval);
    var bars = document.querySelectorAll('.wave-bar');
    bars.forEach(function(bar) {
      bar.style.height = '4px';
      bar.style.opacity = '0.4';
    });
  }

  function simulateTranscription() {
    var phrases = [
      "This is so much faster than typing everything out by hand.",
      "I can't believe how accurate this transcription is.",
      "EnviousWispr just turned my voice into perfectly formatted text.",
      "Dictating emails has never been this effortless."
    ];
    var phrase = phrases[Math.floor(Math.random() * phrases.length)];
    var txtEl = document.getElementById('transcriptText');
    var cursor = document.getElementById('transcriptCursor');
    if (!txtEl) return;
    txtEl.textContent = '';
    if (cursor) cursor.style.display = 'inline-block';
    var i = 0;
    clearInterval(typeInterval);
    typeInterval = setInterval(function() {
      if (i < phrase.length) {
        txtEl.textContent += phrase[i];
        i++;
      } else {
        clearInterval(typeInterval);
      }
    }, 30);
  }

  // ── Confetti ──
  function spawnConfetti() {
    var container = document.getElementById('stepContent');
    if (!container) return;
    var colors = ['#ff3b30', '#ff9f0a', '#34c759', '#5ac8fa', '#af52de', '#ff2d55', state.accentColor];
    for (var i = 0; i < 30; i++) {
      var particle = document.createElement('div');
      particle.className = 'confetti-particle';
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      particle.style.left = (20 + Math.random() * 60) + '%';
      particle.style.top = (10 + Math.random() * 20) + '%';
      particle.style.animationDuration = (1 + Math.random()) + 's';
      particle.style.animationDelay = (Math.random() * 0.3) + 's';
      particle.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
      container.appendChild(particle);
      (function(p) {
        setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 2000);
      })(particle);
    }
  }

  // ── Toggles ──
  function toggleDark() {
    state.darkMode = !state.darkMode;
    var t = document.getElementById('darkToggle');
    if (state.darkMode) t.classList.add('on'); else t.classList.remove('on');
    renderAll();
  }

  function toggleTryIt() {
    state.tryItStep = !state.tryItStep;
    var t = document.getElementById('tryItToggle');
    if (state.tryItStep) t.classList.add('on'); else t.classList.remove('on');
    state.currentStep = 0;
    renderAll();
  }

  function toggleConfetti() {
    state.confetti = !state.confetti;
    var t = document.getElementById('confettiToggle');
    if (state.confetti) t.classList.add('on'); else t.classList.remove('on');
  }

  function togglePulse() {
    state.pulsingIcons = !state.pulsingIcons;
    var t = document.getElementById('pulseToggle');
    if (state.pulsingIcons) t.classList.add('on'); else t.classList.remove('on');
    renderAll();
  }

  function toggleGlow() {
    state.hotkeyGlow = !state.hotkeyGlow;
    var t = document.getElementById('glowToggle');
    if (state.hotkeyGlow) t.classList.add('on'); else t.classList.remove('on');
    renderAll();
  }

  // ── Presets ──
  function applyPreset(name, btnEl) {
    document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
    if (btnEl) btnEl.classList.add('active');

    var presets = {
      'default': { winWidth: 560, winHeight: 480, accentColor: '#4a9eff', progressStyle: 'bar', animSpeed: 0.6, pulsingIcons: true, confetti: true, hotkeyGlow: true },
      'compact': { winWidth: 480, winHeight: 400, accentColor: '#4a9eff', progressStyle: 'dots', animSpeed: 0.4, pulsingIcons: false, confetti: false, hotkeyGlow: false },
      'spacious': { winWidth: 620, winHeight: 540, accentColor: '#5e5ce6', progressStyle: 'bar', animSpeed: 0.8, pulsingIcons: true, confetti: true, hotkeyGlow: true },
      'minimal': { winWidth: 520, winHeight: 440, accentColor: '#64d2ff', progressStyle: 'none', animSpeed: 0.5, pulsingIcons: false, confetti: false, hotkeyGlow: false }
    };

    var p = presets[name];
    if (!p) return;
    Object.keys(p).forEach(function(k) { state[k] = p[k]; });

    document.getElementById('winWidth').value = state.winWidth;
    document.getElementById('winHeight').value = state.winHeight;
    document.getElementById('accentColor').value = state.accentColor;
    document.getElementById('progressStyle').value = state.progressStyle;
    document.getElementById('animSpeed').value = state.animSpeed;
    var pt = document.getElementById('pulseToggle');
    if (state.pulsingIcons) pt.classList.add('on'); else pt.classList.remove('on');
    var ct = document.getElementById('confettiToggle');
    if (state.confetti) ct.classList.add('on'); else ct.classList.remove('on');
    var gt = document.getElementById('glowToggle');
    if (state.hotkeyGlow) gt.classList.add('on'); else gt.classList.remove('on');

    updateState();
  }

  // ── Prompt Output ──
  function updatePrompt() {
    var parts = [];
    var steps = getSteps();
    var stepNames = steps.map(function(s) {
      return { welcome: 'Welcome', mic: 'Microphone Permission', tryit: '"Try It" Live Demo',
               accessibility: 'Accessibility Permission', ready: 'Ready' }[s];
    });

    parts.push('Redesign the EnviousWispr onboarding as a ' + steps.length + '-step flow: ' + stepNames.join(' → ') + '.');
    parts.push('Window size: ' + state.winWidth + 'x' + state.winHeight + '.');

    if (state.accentColor !== DEFAULTS.accentColor) {
      var names = { '#5e5ce6': 'purple', '#30d158': 'green', '#ff6482': 'pink', '#ff9f0a': 'orange', '#64d2ff': 'teal' };
      parts.push('Accent color: ' + (names[state.accentColor] || state.accentColor) + '.');
    }

    if (state.progressStyle !== 'bar') {
      parts.push('Progress indicator: ' + (state.progressStyle === 'dots' ? 'dot indicators' : 'none (clean)') + '.');
    }

    if (state.animSpeed !== DEFAULTS.animSpeed) {
      parts.push('Animation duration: ' + state.animSpeed + 's per step transition.');
    }

    if (!state.darkMode) parts.push('Light mode default.');

    var features = [];
    if (state.pulsingIcons) features.push('pulsing icon animations on permission steps');
    if (state.confetti) features.push('confetti burst on the Ready step');
    if (state.hotkeyGlow) features.push('pulsing glow on the hotkey badge');
    if (state.tryItStep) features.push('interactive "Try It" step with live waveform and simulated transcription');
    if (features.length) parts.push('Include: ' + features.join(', ') + '.');

    var skip = [];
    if (!state.pulsingIcons) skip.push('pulsing icons');
    if (!state.confetti) skip.push('confetti');
    if (!state.hotkeyGlow) skip.push('hotkey glow');
    if (!state.tryItStep) skip.push('"Try It" step');
    if (skip.length) parts.push('Skip: ' + skip.join(', ') + '.');

    parts.push('Permission steps auto-advance after granting. Use fade+scale transitions. The "Try It" step has a record button with live waveform visualization and typewriter-style transcript output. Ready step shows configured hotkey and three feature highlights with staggered fade-in.');
    parts.push('Add --skip-onboarding launch argument and "Reset Onboarding" button in Debug settings for dev/UAT bypass.');

    document.getElementById('promptText').textContent = parts.join(' ');
  }

  function copyPrompt() {
    var text = document.getElementById('promptText').textContent;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    });
  }

  // ── Keyboard Navigation + Option hold-to-record ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') nextStep();
    if (e.key === 'ArrowLeft') prevStep();
    // Option key (Alt) triggers recording on Try It step
    if (e.key === 'Alt' && getSteps()[state.currentStep] === 'tryit') {
      e.preventDefault();
      startHoldRecord();
    }
  });

  document.addEventListener('keyup', function(e) {
    if (e.key === 'Alt' && state.isRecording) {
      stopHoldRecord();
    }
  });

  // ── Init ──
  renderAll();
</script>
</body>
</html>
