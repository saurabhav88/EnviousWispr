<?xml version="1.0" encoding="UTF-8"?>
<!--
  EnviousWispr Menu Bar Icon — RECORDING state
  Radial spectrum wheel with rainbow-colored bars + red recording dot.
  Render at 18-22px.
-->
<svg width="18" height="18" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,100,100,0.3)" stroke-width="2.5" opacity="0.18"/>

  <!-- Spectrum bars — 12 bars arranged radially -->
  <g>
    <!-- 0 deg -->
    <g transform="rotate(0,32,32)">
      <rect x="30" y="4"  width="4" height="14" rx="2" fill="#ff2d55"/>
    </g>
    <!-- 30 deg -->
    <g transform="rotate(30,32,32)">
      <rect x="30" y="7"  width="4" height="10" rx="2" fill="#ff9f0a"/>
    </g>
    <!-- 60 deg -->
    <g transform="rotate(60,32,32)">
      <rect x="30" y="5"  width="4" height="12" rx="2" fill="#ffd60a"/>
    </g>
    <!-- 90 deg -->
    <g transform="rotate(90,32,32)">
      <rect x="30" y="8"  width="4" height="9"  rx="2" fill="#30d158"/>
    </g>
    <!-- 120 deg -->
    <g transform="rotate(120,32,32)">
      <rect x="30" y="4"  width="4" height="14" rx="2" fill="#34c759"/>
    </g>
    <!-- 150 deg -->
    <g transform="rotate(150,32,32)">
      <rect x="30" y="6"  width="4" height="11" rx="2" fill="#32d8be"/>
    </g>
    <!-- 180 deg -->
    <g transform="rotate(180,32,32)">
      <rect x="30" y="5"  width="4" height="13" rx="2" fill="#64d2ff"/>
    </g>
    <!-- 210 deg -->
    <g transform="rotate(210,32,32)">
      <rect x="30" y="8"  width="4" height="9"  rx="2" fill="#0a84ff"/>
    </g>
    <!-- 240 deg -->
    <g transform="rotate(240,32,32)">
      <rect x="30" y="4"  width="4" height="14" rx="2" fill="#5e5ce6"/>
    </g>
    <!-- 270 deg -->
    <g transform="rotate(270,32,32)">
      <rect x="30" y="6"  width="4" height="12" rx="2" fill="#bf5af2"/>
    </g>
    <!-- 300 deg -->
    <g transform="rotate(300,32,32)">
      <rect x="30" y="7"  width="4" height="10" rx="2" fill="#ff2d55"/>
    </g>
    <!-- 330 deg -->
    <g transform="rotate(330,32,32)">
      <rect x="30" y="5"  width="4" height="13" rx="2" fill="#ff9f0a"/>
    </g>
  </g>

  <!-- Recording dot -->
  <circle cx="58" cy="6" r="3.5" fill="#ff453a"/>
</svg>
