    <rect x="168" y="138" width="5" height="44" rx="2" fill="#f50057" opacity="0.85"/>
    <rect x="176" y="138" width="5" height="38" rx="2" fill="#ff1744" opacity="0.85"/>
    <rect x="184" y="138" width="5" height="30" rx="2" fill="#ff5722" opacity="0.85"/>
    <rect x="192" y="138" width="5" height="22" rx="2" fill="#ff9100" opacity="0.85"/>
  </g>

  <!-- Particles scattering from right side -->
  <g opacity="0.8">
