name: PR Check

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Shared Xcode-engine constants for both macOS lanes (#913 PR3). The Ubuntu
# aggregator inherits these harmlessly.
env:
  DERIVED_DATA_PATH: .derivedData/CI
  XCODE_PROJECT: EnviousWispr.xcodeproj
  XCODE_SCHEME: EnviousWispr
  XCODE_RELEASE_SCHEME: EnviousWispr-Release

jobs:
  # Debug lane: Xcode debug build + XPC hygiene self-tests + debug-config logic
  # tests via `xcodebuild test`. Runs in parallel with build-release (issue #906).
  # needs_build gating stays at STEP level so a docs-only PR runs this job but
  # skips the build/test steps and reports success — the build-check aggregator
  # requires success from both lanes. (#913 PR3 moved this lane to the Xcode engine.)
  build-debug:
    runs-on: macos-26
    timeout-minutes: 45
    # Expose this lane's content-detection verdict so the build-check aggregator
    # can report honestly whether a Swift compile actually ran (#1089).
    outputs:
      needs_build: ${{ steps.changes.outputs.needs_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # #825: keep FULL history. "Detect code changes" diffs
          # pull_request.base.sha, which can predate a shallow clone when main
          # advances mid-PR -> "fatal: bad object" -> build-check red before any
          # build runs. Do not re-shallow without explicitly fetching BASE_SHA.
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Detect code changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: scripts/ci/classify-changes.sh "$BASE_SHA" "$HEAD_SHA"

      - name: Verify environment
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          swift --version
          xcodebuild -version
          SDK_VER="$(xcrun --sdk macosx --show-sdk-version)"
          echo "macOS SDK: $SDK_VER"

          if ! swift --version 2>&1 | grep -q "Swift version 6"; then
            echo "::error::Swift 6.0+ required"
            exit 1
          fi

          if [ "$(printf '%s\n' "26.0" "$SDK_VER" | sort -V | head -n1)" != "26.0" ]; then
            echo "::error::macOS SDK 26.0+ required for FoundationModels (found: $SDK_VER)"
            exit 1
          fi

      - name: Install mise + Tuist
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mise" install tuist@4.195.11
          "$HOME/.local/bin/mise" x tuist@4.195.11 -- tuist version

      # tuist generate's internal `xcodebuild -resolvePackageDependencies` call
      # passes no -derivedDataPath, so it resolves into Xcode's global default
      # DerivedData location — NOT the .derivedData/CI path this job caches —
      # paying a full, uncached network resolution every run (issue #1295).
      # Redirecting the global default here, before generate runs and before
      # the cache is restored, makes that resolve land somewhere the cache
      # below actually covers.
      - name: Configure DerivedData cache redirect
        if: steps.changes.outputs.needs_build == 'true'
        run: scripts/ci/configure-tuist-deriveddata-cache.sh "$GITHUB_WORKSPACE/${{ env.DERIVED_DATA_PATH }}"

      - name: Compute Xcode build cache key
        id: xcode-cache-key
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          TOOLCHAIN_ID="$(
            { xcodebuild -version; xcrun --sdk macosx --show-sdk-version; "$HOME/.local/bin/mise" x tuist@4.195.11 -- tuist version; } |
            shasum -a 256 | cut -c1-12
          )"
          echo "toolchain_id=$TOOLCHAIN_ID" >> "$GITHUB_OUTPUT"

      # Rolling key (github.sha suffix) so the primary key is never an exact hit
      # here. pr-check.yml is restore-only by design — main-post-merge.yml is the
      # sole writer (issue #804). restore-keys fall through to the freshest cache.
      # The third path entry is a glob (issue #1295): the redirect above makes
      # tuist generate's implicit resolve write into a per-project hash-named
      # subfolder under .derivedData/CI (Xcode's normal global-default naming),
      # a different shape from the flat SourcePackages/Build the explicit
      # -derivedDataPath build step below writes to. The glob covers both
      # without the workflow needing to predict the hash name.
      - name: Restore Xcode build cache
        id: xcode-cache
        if: steps.changes.outputs.needs_build == 'true'
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            .derivedData/CI/SourcePackages
            .derivedData/CI/Build
            .derivedData/CI/*/SourcePackages
          key: ${{ runner.os }}-${{ runner.arch }}-${{ runner.environment }}-xcode-${{ steps.xcode-cache-key.outputs.toolchain_id }}-${{ hashFiles('Package.resolved', 'Project.swift', 'Workspace.swift', 'Tuist.swift', 'Tuist/**/*.swift') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ runner.environment }}-xcode-${{ steps.xcode-cache-key.outputs.toolchain_id }}-${{ hashFiles('Package.resolved', 'Project.swift', 'Workspace.swift', 'Tuist.swift', 'Tuist/**/*.swift') }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ runner.environment }}-xcode-${{ steps.xcode-cache-key.outputs.toolchain_id }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ runner.environment }}-xcode-

      - name: Log Xcode cache restore
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          echo "==> Xcode cache (debug lane): matched=${{ steps.xcode-cache.outputs.cache-matched-key }} hit=${{ steps.xcode-cache.outputs.cache-hit }}"

      - name: Generate Xcode project
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          "$HOME/.local/bin/mise" x tuist@4.195.11 -- tuist generate --no-open
          # Generated project / DerivedData must never be committed.
          git status --porcelain -- '*.xcodeproj' '*.xcworkspace' '.derivedData'

      - name: Log DerivedData package-resolution location
        if: steps.changes.outputs.needs_build == 'true'
        run: find "$DERIVED_DATA_PATH" -maxdepth 3 -type d -name SourcePackages -print 2>/dev/null || true

      - name: Build (debug, Xcode)
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -destination 'generic/platform=macOS' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            VALID_ARCHS=arm64

      - name: XPC error hygiene self-test
        if: steps.changes.outputs.needs_build == 'true'
        run: scripts/check-xpc-error-hygiene.sh --self-test

      - name: XPC error hygiene
        if: steps.changes.outputs.needs_build == 'true'
        run: scripts/check-xpc-error-hygiene.sh

      - name: Run logic tests (debug, Xcode)
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          set -o pipefail
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -destination 'platform=macOS,arch=arm64' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            VALID_ARCHS=arm64 | tee xcode-test-debug.log

          # Guard against a silent zero-test run: xcodebuild prints suite-level
          # "passed" text even for an empty bundle, so a presence-grep would
          # green a run where nothing executed. Require a positive executed
          # count (summed across the Swift Testing per-target run summaries).
          TESTS_RUN=$(grep -oE "Test run with [0-9]+ test" xcode-test-debug.log | grep -oE "[0-9]+" | awk '{s+=$1} END{print s+0}')
          if [ "$TESTS_RUN" -lt 1 ]; then
            echo "::error::Xcode executed 0 tests (empty/misconfigured bundle) — failing the gate"
            exit 1
          fi
          echo "==> Xcode executed $TESTS_RUN tests (debug)"

  # Release lane: Xcode release build + Release test-target compile +
  # FoundationModels compile probe. Runs in parallel with build-debug (issue
  # #906). The probe is a standalone macOS-26 SDK compile (~5s). The Release
  # test-target compile (issue #1539) catches a test file that references a
  # #if DEBUG-only Sources symbol without gating itself — that class compiles
  # fine in Debug (this lane's sibling `build-debug`) but silently vanishes in
  # Release, previously surfacing only post-merge in main-post-merge.yml. Step-
  # level needs_build gating. (#913 PR3 → Xcode engine.)
  build-release:
    runs-on: macos-26
    timeout-minutes: 45
    # Mirror of build-debug's output; the aggregator cross-checks both lanes and
    # reports "unknown" on any divergence rather than overclaiming (#1089).
    outputs:
      needs_build: ${{ steps.changes.outputs.needs_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # #825: keep FULL history. "Detect code changes" diffs
          # pull_request.base.sha, which can predate a shallow clone when main
          # advances mid-PR -> "fatal: bad object" -> build-check red before any
          # build runs. Do not re-shallow without explicitly fetching BASE_SHA.
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Detect code changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: scripts/ci/classify-changes.sh "$BASE_SHA" "$HEAD_SHA"

      - name: Verify environment
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          swift --version
          xcodebuild -version
          SDK_VER="$(xcrun --sdk macosx --show-sdk-version)"
          echo "macOS SDK: $SDK_VER"

          if ! swift --version 2>&1 | grep -q "Swift version 6"; then
            echo "::error::Swift 6.0+ required"
            exit 1
          fi

          if [ "$(printf '%s\n' "26.0" "$SDK_VER" | sort -V | head -n1)" != "26.0" ]; then
            echo "::error::macOS SDK 26.0+ required for FoundationModels (found: $SDK_VER)"
            exit 1
          fi

      - name: Install mise + Tuist
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mise" install tuist@4.195.11
          "$HOME/.local/bin/mise" x tuist@4.195.11 -- tuist version

      # See build-debug's "Configure DerivedData cache redirect" comment
      # (issue #1295) — same rationale, mirrored for this lane.
      - name: Configure DerivedData cache redirect
        if: steps.changes.outputs.needs_build == 'true'
        run: scripts/ci/configure-tuist-deriveddata-cache.sh "$GITHUB_WORKSPACE/${{ env.DERIVED_DATA_PATH }}"

      - name: Compute Xcode build cache key
        id: xcode-cache-key
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          TOOLCHAIN_ID="$(
            { xcodebuild -version; xcrun --sdk macosx --show-sdk-version; "$HOME/.local/bin/mise" x tuist@4.195.11 -- tuist version; } |
            shasum -a 256 | cut -c1-12
          )"
          echo "toolchain_id=$TOOLCHAIN_ID" >> "$GITHUB_OUTPUT"

      - name: Restore Xcode build cache
        id: xcode-cache
        if: steps.changes.outputs.needs_build == 'true'
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            .derivedData/CI/SourcePackages
            .derivedData/CI/Build
            .derivedData/CI/*/SourcePackages
          key: ${{ runner.os }}-${{ runner.arch }}-${{ runner.environment }}-xcode-${{ steps.xcode-cache-key.outputs.toolchain_id }}-${{ hashFiles('Package.resolved', 'Project.swift', 'Workspace.swift', 'Tuist.swift', 'Tuist/**/*.swift') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ runner.environment }}-xcode-${{ steps.xcode-cache-key.outputs.toolchain_id }}-${{ hashFiles('Package.resolved', 'Project.swift', 'Workspace.swift', 'Tuist.swift', 'Tuist/**/*.swift') }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ runner.environment }}-xcode-${{ steps.xcode-cache-key.outputs.toolchain_id }}-
            ${{ runner.os }}-${{ runner.arch }}-${{ runner.environment }}-xcode-

      - name: Log Xcode cache restore
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          echo "==> Xcode cache (release lane): matched=${{ steps.xcode-cache.outputs.cache-matched-key }} hit=${{ steps.xcode-cache.outputs.cache-hit }}"

      - name: Generate Xcode project
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          "$HOME/.local/bin/mise" x tuist@4.195.11 -- tuist generate --no-open
          git status --porcelain -- '*.xcodeproj' '*.xcworkspace' '.derivedData'

      - name: Log DerivedData package-resolution location
        if: steps.changes.outputs.needs_build == 'true'
        run: find "$DERIVED_DATA_PATH" -maxdepth 3 -type d -name SourcePackages -print 2>/dev/null || true

      - name: Build (release, Xcode)
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_RELEASE_SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -destination 'generic/platform=macOS' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            VALID_ARCHS=arm64

      # Compiles (never runs) both Release-config test targets so a test file
      # that references a #if DEBUG-only Sources symbol without gating itself
      # fails HERE, on the PR, instead of post-merge in main-post-merge.yml
      # (issue #1539; recurred twice in 3 days: #1358/#1498, #1536/#1538).
      # ENABLE_TESTABILITY=YES mirrors main-post-merge.yml's release-test
      # rationale (Release doesn't enable testability by default); it is NOT
      # set on the plain `build` step above, so the shippable release artifact
      # stays non-testable and fully optimized.
      - name: Build for testing (release, Xcode)
        id: release-test-build
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          set -o pipefail
          xcodebuild build-for-testing \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_RELEASE_SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -destination 'platform=macOS,arch=arm64' \
            -resultBundlePath "$GITHUB_WORKSPACE/xcode-build-for-testing-release.xcresult" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            VALID_ARCHS=arm64 \
            ENABLE_TESTABILITY=YES 2>&1 | tee xcode-build-for-testing-release.log

      - name: Upload release test-build failure evidence
        if: failure() && steps.release-test-build.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-test-build-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            xcode-build-for-testing-release.log
            xcode-build-for-testing-release.xcresult
          if-no-files-found: warn
          retention-days: 7

      - name: Verify FoundationModels compile probe
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"

          cat > /tmp/foundation_models_probe.swift <<'PROBE'
          import Foundation
          import FoundationModels

          func _probe() {
            _ = SystemLanguageModel.default
          }
          PROBE

          xcrun swiftc \
            -sdk "$SDK_PATH" \
            -target arm64-apple-macos26.0 \
            /tmp/foundation_models_probe.swift \
            -o /tmp/foundation_models_probe

          echo "==> FoundationModels compile probe PASSED"

  # Required aggregate gate. This is the ONLY required status check on main
  # (ruleset main-protection, context "build-check"); keeping the job id
  # "build-check" preserves that context so no ruleset change is needed (#906).
  # always() && !cancelled(): runs after the lanes even when one fails (so it can
  # fail closed), but is skipped when the whole run is cancelled (a superseded
  # push) so the obsolete SHA shows "cancelled", not a false "Failure".
  build-check:
    needs: [build-debug, build-release]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: CI self-tests (classify-changes + fetch-depth lint)
        run: |
          set -euo pipefail
          scripts/ci/classify-changes.sh --self-test
          scripts/ci/check-pr-check-fetch-depth.sh

      - name: Download-link lint (doorway tagging + on-site /#download)
        run: |
          set -euo pipefail
          scripts/ci/check-download-link-utms.sh --self-test
          scripts/ci/check-download-link-utms.sh

      - name: Require both build lanes
        run: |
          if [ "${{ needs.build-debug.result }}" != "success" ] || [ "${{ needs.build-release.result }}" != "success" ]; then
            echo "::error::build lane failed — build-debug=${{ needs.build-debug.result }} build-release=${{ needs.build-release.result }}"
            exit 1
          fi
          echo "==> Both build lanes passed."

      - name: Report build status
        run: |
          set -euo pipefail
          # Honest at-a-glance signal for reviewers: distinguish a real Swift
          # build + test pass from a content-only skip, without touching the
          # required-check name or the per-step skip logic (#1089). Runs only
          # after the fail-closed gate above, so it renders solely on a green
          # run. Both lanes run identical content detection on the same SHAs;
          # require them to agree, else report "unknown" rather than overclaim.
          debug_needs="${{ needs.build-debug.outputs.needs_build }}"
          release_needs="${{ needs.build-release.outputs.needs_build }}"
          if [ "$debug_needs" = "true" ] && [ "$release_needs" = "true" ]; then
            STATUS="build-check passed: Swift build and tests ran."
          elif [ "$debug_needs" = "false" ] && [ "$release_needs" = "false" ]; then
            STATUS="build-check passed: change classified as content-only, Swift build and tests intentionally skipped."
          else
            STATUS="build-check passed: build mode unknown (lane verdicts debug='$debug_needs' release='$release_needs')."
          fi
          echo "==> $STATUS"
          echo "$STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=build-check::$STATUS"
