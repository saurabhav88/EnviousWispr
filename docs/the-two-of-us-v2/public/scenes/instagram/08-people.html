<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Scene 08 — People</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f0a1a;
    font-family: 'Inter', system-ui, sans-serif;
    position: relative;
  }
  .scene-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .header {
    position: absolute;
    top: 6%;
    left: 0;
    right: 0;
    text-align: center;
    padding: 0 80px;
    color: #ffffff;
    font-size: 42px;
    font-weight: 700;
    line-height: 1.3;
    white-space: pre-line;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
  }
  .footer {
    position: absolute;
    bottom: 4%;
    right: 80px;
    text-align: right;
    color: #ffffff;
    font-size: 32px;
    font-weight: 500;
    line-height: 1.6;
    white-space: pre-line;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,1);
  }
</style>
</head>
<body>
  <img class="scene-img" src="../originals/scene-07-people.png" alt="People scene">
  <div class="header">Designed for...</div>
  <div class="footer">Every word counts.
Every moment matters.
Yours too.</div>
</body>
</html>
