<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnviousWispr — Advanced Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  /* --- Design System --- */
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a28;
    --bg-card-hover: #22223a;
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-glow: rgba(255, 255, 255, 0.12);
    --text-primary: #e8e8f0;
    --text-secondary: #9898b0;
    --text-muted: #686880;
    --cat-app: #8a2be2;
    --cat-audio: #00e5ff;
    --cat-vad: #00bfa5;
    --cat-asr: #1e90ff;
    --cat-parakeet: #448aff;
    --cat-whisperkit: #5c6bc0;
    --cat-pipeline: #00fa9a;
    --cat-llm: #ffd700;
    --cat-postprocess: #ff9800;
    --cat-services: #ff8c00;
    --cat-storage: #adff2f;
    --cat-views: #ff2a40;
    --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
    --shadow-glow: 0 0 30px rgba(138, 43, 226, 0.15);
    --radius-card: 16px;
    --radius-sm: 8px;
    --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-sans);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* --- Header --- */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(135deg, #c084fc, #818cf8, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 12px;
    font-weight: 400;
  }

  .header-flow {
    display: flex;
    align-items: center;
    gap: 0;
    opacity: 0.6;
  }
  .header-flow .flow-step {
    font-size: 10px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-weight: 500;
  }
  .header-flow .flow-arrow {
    color: var(--text-muted);
    margin: 0 6px;
    font-size: 8px;
  }
  .header-flow .flow-bracket {
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
  }

  .header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .header-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
  }

  .header-btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-glow);
    color: var(--text-primary);
  }

  .header-btn.active {
    background: rgba(138, 43, 226, 0.2);
    border-color: rgba(138, 43, 226, 0.4);
    color: #c084fc;
  }

  .zoom-display {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 40px;
    text-align: center;
  }

  /* --- Legend (slim vertical left wall) --- */
  .legend {
    position: fixed;
    top: 56px;
    left: 0;
    bottom: 0;
    width: 44px;
    background: rgba(18, 18, 26, 0.9);
    backdrop-filter: blur(16px);
    border-right: 1px solid var(--border-subtle);
    z-index: 90;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 6px;
    overflow: hidden;
    transition: width 0.3s ease;
  }

  .legend.expanded {
    width: 180px;
    align-items: flex-start;
    padding: 16px 12px;
  }

  .legend-title {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    display: none;
  }

  .legend.expanded .legend-title {
    display: block;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    justify-content: center;
  }

  .legend.expanded .legend-item {
    justify-content: flex-start;
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
    display: none;
  }

  .legend.expanded .legend-label {
    display: block;
  }

  .legend-toggle {
    margin-top: auto;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 10px;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.2s;
  }

  .legend-toggle:hover {
    color: var(--text-primary);
  }

  /* --- Canvas Container --- */
  .canvas-container {
    position: absolute;
    top: 56px; left: 44px; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }

  .canvas-container.dragging {
    cursor: grabbing;
  }

  .canvas {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* --- Module Card Styles --- */
  .module-group {
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .module-bg {
    fill: var(--bg-card);
    stroke: var(--border-subtle);
    stroke-width: 1;
    transition: fill 0.15s ease, stroke 0.15s ease;
  }

  .module-group:hover .module-bg {
    fill: var(--bg-card-hover);
    stroke: var(--border-glow);
  }

  .module-accent {
    rx: 3;
    ry: 3;
  }

  .module-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 36px;
    fill: var(--text-primary);
  }

  .module-desc {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 28px;
    fill: var(--text-secondary);
  }

  /* --- Row Headers --- */
  .row-header {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 22px;
    fill: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    opacity: 0.5;
  }

  /* --- Connection Styles --- */
  .connection-path {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.45;
    transition: opacity 0.18s ease, stroke-width 0.18s ease;
    cursor: pointer;
  }

  .connection-path.primary {
    stroke-width: 2.5;
    opacity: 0.7;
  }

  .connection-path:hover {
    opacity: 1;
    stroke-width: 3;
  }

  .connection-label {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    font-size: 14px;
    fill: var(--text-muted);
    opacity: 0;
    transition: opacity 0.18s ease;
    pointer-events: none;
  }

  .connection-group:hover .connection-path {
    opacity: 1;
    stroke-width: 3;
  }

  .connection-group:hover .connection-label {
    opacity: 1;
  }

  /* --- Dim / Highlight states --- */
  .module-group.dimmed { opacity: 0.2; transition: opacity 0.2s; }
  .module-group.highlighted { opacity: 1; transition: opacity 0.2s; }
  .connection-group.dimmed .connection-path { opacity: 0.06 !important; stroke-width: 1 !important; }
  .connection-group.highlighted .connection-path { opacity: 1 !important; stroke-width: 3 !important; }
  .connection-group.highlighted .connection-label { opacity: 1 !important; }

  /* --- Search Bar --- */
  .search-container {
    position: fixed;
    top: 68px;
    right: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .search-input {
    background: rgba(26, 26, 40, 0.92);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 8px 12px 8px 32px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s, width 0.2s;
  }

  .search-input:focus {
    border-color: rgba(138, 43, 226, 0.5);
    width: 280px;
  }

  .search-input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 10px;
    color: var(--text-muted);
    font-size: 13px;
    pointer-events: none;
  }

  .search-clear {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 6px;
    border-radius: 4px;
    transition: color 0.2s;
    display: none;
  }

  .search-clear.visible { display: block; }
  .search-clear:hover { color: var(--text-primary); }

  .module-group.search-match .module-bg {
    stroke: rgba(138, 43, 226, 0.6) !important;
    stroke-width: 2 !important;
  }

  .module-group.search-no-match {
    opacity: 0.15 !important;
  }

  /* --- Detail Panel --- */
  .detail-panel {
    position: fixed;
    top: 56px;
    right: -420px;
    width: 400px;
    height: calc(100vh - 56px);
    background: rgba(18, 18, 26, 0.96);
    backdrop-filter: blur(24px);
    border-left: 1px solid var(--border-subtle);
    z-index: 200;
    overflow-y: auto;
    transition: right 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    padding: 28px;
    box-shadow: -8px 0 32px rgba(0, 0, 0, 0.3);
  }

  .detail-panel.open { right: 0; }

  .detail-panel-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }

  .detail-panel-close:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
  }

  .detail-panel-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    padding-right: 36px;
  }

  .detail-panel-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 20px;
    color: #fff;
  }

  .detail-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    margin-top: 24px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .detail-section-title:first-of-type {
    margin-top: 16px;
  }

  .detail-what-it-does {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-bottom: 4px;
  }

  .detail-connection-list {
    list-style: none;
    margin-bottom: 4px;
  }

  .detail-connection-list li {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    cursor: pointer;
    transition: color 0.15s;
  }

  .detail-connection-list li:hover {
    color: var(--text-primary);
  }

  .detail-connection-arrow {
    font-size: 11px;
    flex-shrink: 0;
    width: 18px;
    text-align: center;
  }

  /* --- Pipeline State Annotation --- */
  .pipeline-state {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    fill: var(--text-muted);
    opacity: 0.6;
  }

  /* --- Data Flow Animation --- */
  @keyframes flowDot {
    0% { offset-distance: 0%; opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }

  .flow-dot {
    offset-rotate: 0deg;
    animation: flowDot var(--flow-speed, 2.5s) linear infinite;
    animation-delay: var(--flow-delay, 0s);
  }

  /* --- Scrollbar --- */
  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
  .detail-panel::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

  /* --- Responsive --- */
  @media (max-width: 1440px) {
    .detail-panel { width: 360px; right: -380px; }
  }
  @media (max-width: 1280px) {
    .search-input { width: 180px; }
    .search-input:focus { width: 220px; }
    .detail-panel { width: 320px; right: -340px; padding: 20px; }
  }
  @media (max-width: 1024px) {
    .detail-panel { width: 280px; right: -300px; padding: 16px; }
    .detail-panel-name { font-size: 18px; }
    .header-flow { display: none; }
  }

</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div style="display:flex;align-items:baseline;">
    <span class="header-title">EnviousWispr Architecture</span>
    <span class="header-subtitle">Advanced Module Map</span>
  </div>
  <div class="header-flow">
    <span class="flow-step">Hotkey</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-step">AudioCapture</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-bracket">[</span><span class="flow-step">VAD</span><span class="flow-bracket">]</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-step">ASR</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-step">Pipeline</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-bracket">[</span><span class="flow-step">LLM Polish</span><span class="flow-bracket">]</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-bracket">[</span><span class="flow-step">WordCorrection</span><span class="flow-bracket">]</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-step">Store</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-step">Clipboard</span>
    <span class="flow-arrow">&#9654;</span>
    <span class="flow-step">Paste</span>
  </div>
  <div class="header-controls">
    <button class="header-btn" id="flowToggle" onclick="toggleDataFlow()">Show Data Flow</button>
    <span style="width:1px;height:20px;background:var(--border-subtle);margin:0 4px;"></span>
    <button class="header-btn" onclick="resetView()">Reset View</button>
    <button class="header-btn" onclick="zoomIn()">+</button>
    <span class="zoom-display" id="zoomLevel">100%</span>
    <button class="header-btn" onclick="zoomOut()">&minus;</button>
  </div>
</div>

<!-- Legend (slim vertical left wall) -->
<div class="legend" id="legend">
  <div class="legend-title">Categories</div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-app)"></span><span class="legend-label">Core App</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-audio)"></span><span class="legend-label">Audio Capture</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-vad)"></span><span class="legend-label">VAD</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-asr)"></span><span class="legend-label">ASR Engine</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-parakeet)"></span><span class="legend-label">Parakeet</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-whisperkit)"></span><span class="legend-label">WhisperKit</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-pipeline)"></span><span class="legend-label">Pipeline</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-llm)"></span><span class="legend-label">LLM Polish</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-postprocess)"></span><span class="legend-label">Post-Process</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-services)"></span><span class="legend-label">Services</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-storage)"></span><span class="legend-label">Storage</span></div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--cat-views)"></span><span class="legend-label">Views / UI</span></div>
  <button class="legend-toggle" id="legendToggle" onclick="toggleLegend()">&#x25B6;</button>
</div>

<!-- Search Bar -->
<div class="search-container">
  <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
  <input type="text" class="search-input" id="searchInput" placeholder="Search modules..." autocomplete="off" spellcheck="false"/>
  <button class="search-clear" id="searchClear" onclick="clearSearch()">&#x2715;</button>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-panel-close" onclick="closeDetailPanel()">&#x2715;</button>
  <div id="detailContent"></div>
</div>

<!--
  LAYOUT REFERENCE (all cards h=160, 40px gaps)
  =============================================
  SVG: 3200 x 1180

  ROW 1 y=80 (Entry & Orchestration)
    AppState:      x=80   w=500  → right=580
    AppDelegate:   x=620  w=480  → right=1100
    MenuBarAnim:   x=1140 w=460  → right=1600
    Pipeline:      x=1640 w=540  → right=2180
    Services:      x=2220 w=520  → right=2740

  ROW 2 y=320 (Input Processing)
    AudioCapture:  x=80   w=520  → right=600
    AudioDevice:   x=640  w=480  → right=1120
    SilenceDetect: x=1160 w=480  → right=1640
    TextProcessing:x=1680 w=540  → right=2220
    TranscriptStr: x=2260 w=520  → right=2780

  ROW 3 y=560 (Speech Recognition)
    ASRManager:    x=80   w=500  → right=580
    Parakeet:      x=620  w=460  → right=1080
    WhisperKit:    x=1120 w=460  → right=1580
    LLM:           x=1620 w=540  → right=2160
    Models:        x=2200 w=520  → right=2720

  ROW 4 y=780 (Text Processing & Output)
    PostProcess:   x=1620 w=540  → right=2160

  ROW 5 y=960 (User Interface) — 20px gap after Row 4 bottom (780+160=940)
    Views:         x=80   w=1000 → right=1080
-->

<!-- SVG Canvas -->
<div class="canvas-container" id="canvasContainer">
<div class="canvas" id="canvas">
<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1180" viewBox="0 0 3200 1180" id="diagram">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.05)" />
    </pattern>

    <!-- Glow filters per category -->
    <filter id="glow-app" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#8a2be2" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-audio" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-vad" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00bfa5" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-asr" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#1e90ff" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-parakeet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#448aff" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-whisperkit" x="-20%" y="-20%" width="140%" height="140%">

  // ===================================================
  // PAN & ZOOM
  // ===================================================

  var container = document.getElementById('canvasContainer');
  var canvas = document.getElementById('canvas');
  var zoomDisplay = document.getElementById('zoomLevel');

  var scale = 1;
  var panX = 0;
  var panY = 0;
  var isDragging = false;
  var dragStartX = 0;
  var dragStartY = 0;

  function applyTransform() {
    canvas.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + scale + ')';
    zoomDisplay.textContent = Math.round(scale * 100) + '%';
  }

  function centerView() {
    var cw = container.clientWidth;
    var ch = container.clientHeight;
    var sw = 3200;
    var sh = 1180;
    var fitScale = Math.min(cw / (sw + 40), ch / (sh + 40));
    scale = Math.min(fitScale, 1.0);
    panX = (cw - sw * scale) / 2;
    panY = (ch - sh * scale) / 2;
    applyTransform();
  }

  window.resetView = function() { centerView(); };
  window.zoomIn = function() { scale = Math.min(scale * 1.2, 3.0); applyTransform(); };
  window.zoomOut = function() { scale = Math.max(scale / 1.2, 0.3); applyTransform(); };

  container.addEventListener('wheel', function(e) {
    e.preventDefault();
    var rect = container.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var oldScale = scale;
    var delta = e.deltaY > 0 ? 0.9 : 1.1;
    scale = Math.max(0.3, Math.min(3.0, scale * delta));
    panX = mx - (mx - panX) * (scale / oldScale);
    panY = my - (my - panY) * (scale / oldScale);
    applyTransform();
  }, { passive: false });

  container.addEventListener('mousedown', function(e) {
    if (e.target.closest('.module-group') || e.target.closest('.connection-group')) return;
    isDragging = true;
    dragStartX = e.clientX - panX;
    dragStartY = e.clientY - panY;
    container.classList.add('dragging');
  });

  window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    panX = e.clientX - dragStartX;
    panY = e.clientY - dragStartY;
    applyTransform();
  });

  window.addEventListener('mouseup', function() {
    isDragging = false;
    container.classList.remove('dragging');
  });

  centerView();
  window.addEventListener('resize', centerView);

  // ===================================================

  var allModules = document.querySelectorAll('.module-group');
  var allConnections = document.querySelectorAll('.connection-group');

  window.highlightModule = function(el) {
    var id = el.dataset.id;
    var cat = el.dataset.category;
    var bg = el.querySelector('.module-bg');
    if (bg) bg.style.filter = 'url(#glow-' + cat + ')';
    var connectedIds = {};
    connectedIds[id] = true;
    for (var i = 0; i < allConnections.length; i++) {
      var conn = allConnections[i];
      var from = conn.dataset.from;
      var to = conn.dataset.to;
      if (from === id || to === id) {
        connectedIds[from] = true;
        connectedIds[to] = true;
        conn.classList.add('highlighted');
        conn.classList.remove('dimmed');
      } else {
        conn.classList.add('dimmed');
        conn.classList.remove('highlighted');
      }
    }
    for (var j = 0; j < allModules.length; j++) {
      var mod = allModules[j];
      if (connectedIds[mod.dataset.id]) {
        mod.classList.add('highlighted');
        mod.classList.remove('dimmed');
      } else {
        mod.classList.add('dimmed');
        mod.classList.remove('highlighted');
      }
    }
  };

  window.unhighlightModule = function(el) {
    var bg = el.querySelector('.module-bg');
    if (bg) bg.style.filter = 'none';
    for (var i = 0; i < allModules.length; i++) {
      allModules[i].classList.remove('dimmed', 'highlighted');

    for (var j = 0; j < allConnections.length; j++) {
      allConnections[j].classList.remove('dimmed', 'highlighted');

  };

  function buildDetailHTML(data) {
    var parts = [];
    parts.push('<div class="detail-panel-name" style="color:' + data.color + ';">' + data.name + '</div>');
    parts.push('<span class="detail-panel-badge" style="background:' + data.color + ';">' + data.categoryLabel + '</span>');
    parts.push('<div class="detail-section-title">Description</div>');
    parts.push('<div class="detail-what-it-does">' + data.description + '</div>');
    if (data.connectsTo.outgoing.length > 0 || data.connectsTo.incoming.length > 0) {
      if (data.connectsTo.outgoing.length > 0) {
        parts.push('<div class="detail-section-title">Outgoing Connections</div>');
        parts.push('<ul class="detail-connection-list">');
        for (var o = 0; o < data.connectsTo.outgoing.length; o++) {

        parts.push('</ul>');

      if (data.connectsTo.incoming.length > 0) {
        parts.push('<div class="detail-section-title">Incoming Connections</div>');
        parts.push('<ul class="detail-connection-list">');
        for (var ic = 0; ic < data.connectsTo.incoming.length; ic++) {

      parts.push('<li style="color:var(--text-muted);border:none;">Standalone module \u2014 no direct connections</li>');

  for (var m = 0; m < allModules.length; m++) {
    (function(mod) {
      mod.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = mod.dataset.id;
        var data = moduleData[id];
        if (!data) return;
        detailContent.innerHTML = buildDetailHTML(data);
        detailPanel.classList.add('open');
      });
    })(allModules[m]);
  }

  window.closeDetailPanel = function() { detailPanel.classList.remove('open'); };

  container.addEventListener('click', function(e) {
    if (!e.target.closest('.module-group') && !e.target.closest('.connection-group')) {
      closeDetailPanel();
    }
  });

  // ===================================================
  // KEYBOARD SHORTCUTS
  // ===================================================

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeDetailPanel(); clearSearch(); }
    if (e.key === '/' && !e.target.closest('input')) { e.preventDefault(); document.getElementById('searchInput').focus(); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  });

  // ===================================================
  // DATA FLOW ANIMATION TOGGLE
  // ===================================================

  var flowActive = false;
  var flowDotsLayer = document.getElementById('flowDotsLayer');
  var flowToggleBtn = document.getElementById('flowToggle');

  window.toggleDataFlow = function() {
    flowActive = !flowActive;
    flowDotsLayer.style.display = flowActive ? 'block' : 'none';
    flowToggleBtn.textContent = flowActive ? 'Hide Data Flow' : 'Show Data Flow';
    if (flowActive) { flowToggleBtn.classList.add('active'); }
    else { flowToggleBtn.classList.remove('active'); }
  };

  // ===================================================
  // SEARCH
  // ===================================================

  var searchInput = document.getElementById('searchInput');
  var searchClear = document.getElementById('searchClear');

  searchInput.addEventListener('input', function() {
    var query = searchInput.value.toLowerCase().trim();
    if (query.length > 0) { searchClear.classList.add('visible'); }
    else { searchClear.classList.remove('visible'); }
    if (query.length === 0) {
      for (var i = 0; i < allModules.length; i++) { allModules[i].classList.remove('search-match', 'search-no-match'); }
      return;
    }
    for (var j = 0; j < allModules.length; j++) {
      var mod = allModules[j];
      var id = mod.dataset.id;
      var data = moduleData[id];
      if (!data) continue;
      var searchable = (data.name + ' ' + data.categoryLabel + ' ' + data.description).toLowerCase();
      if (searchable.indexOf(query) !== -1) { mod.classList.add('search-match'); mod.classList.remove('search-no-match'); }
      else { mod.classList.remove('search-match'); mod.classList.add('search-no-match'); }
    }
  });

  window.clearSearch = function() {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    for (var i = 0; i < allModules.length; i++) { allModules[i].classList.remove('search-match', 'search-no-match'); }
  };

  // ===================================================
  // LEGEND TOGGLE
  // ===================================================

  var legend = document.getElementById('legend');
  var legendToggle = document.getElementById('legendToggle');

  window.toggleLegend = function() {
    var expanded = legend.classList.toggle('expanded');
    legendToggle.innerHTML = expanded ? '&#x25C0;' : '&#x25B6;';
  };

})();
</script>
</body>
</html>
