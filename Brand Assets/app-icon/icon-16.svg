    <rect x="120" y="93"  width="5" height="25" rx="2" fill="#00e5ff" opacity="0.9"/>
    <rect x="128" y="93"  width="5" height="25" rx="2" fill="#00b0ff" opacity="0.9"/>
    <rect x="136" y="90"  width="5" height="28" rx="2" fill="#2979ff" opacity="0.9"/>
    <rect x="144" y="84"  width="5" height="34" rx="2" fill="#651fff" opacity="0.9"/>
    <rect x="152" y="78"  width="5" height="40" rx="2" fill="#7c4dff" opacity="0.9"/>
    <rect x="160" y="72"  width="5" height="46" rx="2" fill="#d500f9" opacity="0.9"/>
    <rect x="168" y="68"  width="5" height="50" rx="2" fill="#f50057" opacity="0.9"/>
    <rect x="176" y="72"  width="5" height="46" rx="2" fill="#ff1744" opacity="0.9"/>
    <rect x="184" y="78"  width="5" height="40" rx="2" fill="#ff5722" opacity="0.9"/>
