<!--
  EnviousWispr v2 App Icon — Production (1024x1024)
  viewBox: 0 0 256 256, rendered at 1024x1024
  Scale: 64-unit → 256-unit = 4.0x
  barWidth: 4.5 * 4 = 18 (spec says 14, using spec value 14)
  rx: 1.5 * 4 = 6 (spec glow=4, using rx=5 per instructions)
  translate(hOffset=8, vOffset=13) applied to lip content group
  Gap delta: (gap - 10) * scale * 0.15 = (18-10) * 4 * 0.15 = 4.8
    Upper bars shift UP by 4.8 (subtract from y)
    Lower bars shift DOWN by 4.8 (add to y)

  === BAR POSITION COMPUTATION (64-unit space) ===

  bowDepth = 0.75
  bowOffsets = [3.0, 0.85, -1.28, 1.28, 3.41, 1.28, -1.28, 0.85, 3.0]

  For each bar i:
    offset = bowOffsets[i] * 0.75
    Upper: x=x[i], y = 25 - upperH[i] + offset, h = upperH[i]
    Lower: x=x[i], y = 28 + offset, h = lowerH[i]

  i=0: offset=2.25    Upper: x=4,  y=22.25,    h=5   Lower: x=4,  y=30.25,    h=5
  i=1: offset=0.6375  Upper: x=10, y=17.6375,  h=8   Lower: x=10, y=28.6375,  h=9
  i=2: offset=-0.96   Upper: x=16, y=12.04,    h=12  Lower: x=16, y=27.04,    h=12
  i=3: offset=0.96    Upper: x=22, y=16.96,    h=9   Lower: x=22, y=28.96,    h=15
  i=4: offset=2.5575  Upper: x=28, y=21.5575,  h=6   Lower: x=28, y=30.5575,  h=17
  i=5: offset=0.96    Upper: x=34, y=16.96,    h=9   Lower: x=34, y=28.96,    h=15
  i=6: offset=-0.96   Upper: x=40, y=12.04,    h=12  Lower: x=40, y=27.04,    h=12
  i=7: offset=0.6375  Upper: x=46, y=17.6375,  h=8   Lower: x=46, y=28.6375,  h=9
  i=8: offset=2.25    Upper: x=52, y=22.25,    h=5   Lower: x=52, y=30.25,    h=5

  === SCALED TO 256-unit (x4) + gap delta (4.8) ===

  barWidth = 14 (from spec), rx = 5

  Upper bars (y shifted UP by 4.8):
  i=0: x=16,  y=89-4.8=84.2,      h=20
  i=1: x=40,  y=70.55-4.8=65.75,  h=32
  i=2: x=64,  y=48.16-4.8=43.36,  h=48
  i=3: x=88,  y=67.84-4.8=63.04,  h=36
  i=4: x=112, y=86.23-4.8=81.43,  h=24
  i=5: x=136, y=67.84-4.8=63.04,  h=36
  i=6: x=160, y=48.16-4.8=43.36,  h=48
  i=7: x=184, y=70.55-4.8=65.75,  h=32
  i=8: x=208, y=89-4.8=84.2,      h=20

  Lower bars (y shifted DOWN by 4.8):
  i=0: x=16,  y=121+4.8=125.8,     h=20
  i=1: x=40,  y=114.55+4.8=119.35, h=36
  i=2: x=64,  y=108.16+4.8=112.96, h=48
  i=3: x=88,  y=115.84+4.8=120.64, h=60
  i=4: x=112, y=122.23+4.8=127.03, h=68
  i=5: x=136, y=115.84+4.8=120.64, h=60
  i=6: x=160, y=108.16+4.8=112.96, h=48
  i=7: x=184, y=114.55+4.8=119.35, h=36
  i=8: x=208, y=121+4.8=125.8,     h=20
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 256 256">
  <defs>
    <!-- macOS squircle clip path -->
    <clipPath id="squircle">
      <path d="M128,2 C186,2 210,2 230,22 C254,42 254,70 254,128 C254,186 254,210 234,230 C214,254 186,254 128,254 C70,254 46,254 26,234 C2,214 2,186 2,128 C2,70 2,46 22,26 C42,2 70,2 128,2Z"/>
    </clipPath>
    <!-- Radial gradient for background depth -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </radialGradient>
    <!-- Glow filter for bars -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Clipped content -->
  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="256" height="256" fill="#0d0d14"/>
    <rect width="256" height="256" fill="url(#bgGlow)" opacity="0.3"/>

    <!-- Lip bars with glow, translated by hOffset=8, vOffset=13 -->
    <g transform="translate(8,13)" filter="url(#glow)">
      <!-- Upper lip bars (opacity 0.92) -->
      <rect x="16"  y="84.2"  width="14" height="20" rx="5" fill="#ff2a40" opacity="0.92"/>
      <rect x="40"  y="65.75" width="14" height="32" rx="5" fill="#ff8c00" opacity="0.92"/>
      <rect x="64"  y="43.36" width="14" height="48" rx="5" fill="#ffd700" opacity="0.92"/>
      <rect x="88"  y="63.04" width="14" height="36" rx="5" fill="#adff2f" opacity="0.92"/>
      <rect x="112" y="81.43" width="14" height="24" rx="5" fill="#00fa9a" opacity="0.92"/>
      <rect x="136" y="63.04" width="14" height="36" rx="5" fill="#00ffff" opacity="0.92"/>
      <rect x="160" y="43.36" width="14" height="48" rx="5" fill="#1e90ff" opacity="0.92"/>
      <rect x="184" y="65.75" width="14" height="32" rx="5" fill="#4169e1" opacity="0.92"/>
      <rect x="208" y="84.2"  width="14" height="20" rx="5" fill="#8a2be2" opacity="0.92"/>

      <!-- Lower lip bars (opacity 0.88) -->
      <rect x="16"  y="125.8"  width="14" height="20" rx="5" fill="#4169e1" opacity="0.88"/>
      <rect x="40"  y="119.35" width="14" height="36" rx="5" fill="#1e90ff" opacity="0.88"/>
      <rect x="64"  y="112.96" width="14" height="48" rx="5" fill="#00ffff" opacity="0.88"/>
      <rect x="88"  y="120.64" width="14" height="60" rx="5" fill="#00fa9a" opacity="0.88"/>
      <rect x="112" y="127.03" width="14" height="68" rx="5" fill="#adff2f" opacity="0.88"/>
      <rect x="136" y="120.64" width="14" height="60" rx="5" fill="#ffd700" opacity="0.88"/>
      <rect x="160" y="112.96" width="14" height="48" rx="5" fill="#ff8c00" opacity="0.88"/>
      <rect x="184" y="119.35" width="14" height="36" rx="5" fill="#ff2a40" opacity="0.88"/>
      <rect x="208" y="125.8"  width="14" height="20" rx="5" fill="#8a2be2" opacity="0.88"/>
    </g>
  </g>
</svg>
